<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E6E66">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>PhD Weekly Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<style>
  :root {
    --paper:#F4F5F2; --card:#FFFFFF; --ink:#1C2733; --ink-soft:#5A6875;
    --line:#DDE2E0; --teal:#0E6E66; --teal-soft:#E2F0EE;
    --amber:#A15C07; --amber-soft:#FBEEDC; --red:#9E3B3B; --red-soft:#F6E4E4;
    --navy:#2B4162; --navy-soft:#E7ECF3;
  }
  * { box-sizing:border-box; margin:0; }
  body { background:var(--paper); color:var(--ink); font-family:'Helvetica Neue',Arial,sans-serif; padding:16px 12px calc(24px + env(safe-area-inset-bottom)); }
  .wrap { max-width:780px; margin:0 auto; }
  h1 { font-family:Georgia,serif; font-size:26px; margin:2px 0 4px; }
  .eyebrow { font-size:11px; letter-spacing:2px; color:var(--teal); text-transform:uppercase; }
  .sub { font-size:13px; color:var(--ink-soft); }
  .banner { background:var(--amber-soft); border:1px solid var(--amber); color:var(--amber); border-radius:10px; padding:10px 14px; margin:12px 0; font-size:13px; }
  .tabs { display:flex; gap:4px; flex-wrap:wrap; margin:14px 0; }
  .tab { border:none; cursor:pointer; font-size:13px; padding:8px 12px; border-radius:8px; background:transparent; color:var(--ink-soft); }
  .tab.on { background:var(--ink); color:#fff; font-weight:600; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:12px 14px; margin-bottom:10px; }
  .card.today { border-color:var(--teal); box-shadow:0 0 0 2px var(--teal-soft); }
  .dayhead { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:4px; }
  .dayname { font-family:Georgia,serif; font-size:16px; }
  .todaytag { font-size:11px; color:var(--teal); margin-left:8px; }
  .datetag { font-size:12px; color:var(--ink-soft); }
  .task { display:flex; align-items:center; gap:8px; padding:6px 0; border-bottom:1px solid var(--line); }
  .dot { width:9px; height:9px; border-radius:9px; flex-shrink:0; }
  .dot.pending{background:var(--amber)} .dot.done{background:var(--teal)} .dot.missed{background:var(--red)}
  .tasktext { flex:1; font-size:14px; min-width:120px; }
  .tasktext.done { text-decoration:line-through; opacity:.6; }
  .timechip { background:transparent; color:var(--navy); border:1px dashed var(--line); border-radius:6px; font-size:12px; padding:2px 6px; cursor:pointer; min-width:46px; flex-shrink:0; }
  .timechip.set { background:var(--navy-soft); border-color:var(--navy); }
  .ibtn { background:transparent; border:1px solid var(--line); color:var(--ink-soft); border-radius:6px; min-width:26px; height:26px; font-size:13px; cursor:pointer; flex-shrink:0; display:inline-flex; align-items:center; justify-content:center; }
  .ibtn.ok { border-color:var(--teal); color:var(--teal); }
  .ibtn.ok.on { background:var(--teal); color:#fff; }
  .ibtn.no { border-color:var(--red); color:var(--red); }
  .ibtn.no.on { background:var(--red); color:#fff; }
  .addrow { display:flex; gap:6px; margin-top:8px; flex-wrap:wrap; }
  input[type=text], input[type=time] { border:1px solid var(--line); border-radius:6px; padding:7px 8px; font-size:14px; color:var(--ink); background:var(--paper); outline:none; }
  input[type=text] { flex:1; min-width:150px; }
  .btn { background:var(--teal); color:#fff; border:1px solid var(--teal); border-radius:6px; padding:7px 14px; font-size:13px; cursor:pointer; }
  .btn.ghost { background:transparent; color:var(--ink); border-color:var(--line); }
  .btn.soft { background:var(--teal-soft); color:var(--teal); border-color:var(--teal); }
  .navrow { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; gap:8px; }
  .navtitle { font-family:Georgia,serif; font-size:15px; text-align:center; flex:1; }
  .empty { font-size:13px; color:var(--ink-soft); font-style:italic; padding:4px 0; }
  .hint { font-size:12px; color:var(--amber); margin-top:6px; }
  .pill { font-size:12px; border-radius:6px; padding:2px 8px; flex-shrink:0; }
  .pill.missed { color:var(--red); background:var(--red-soft); }
  .pill.overdue { color:var(--amber); background:var(--amber-soft); }
  .bar { background:var(--line); border-radius:6px; height:10px; flex:1; overflow:hidden; }
  .bar > div { height:100%; border-radius:6px; background:var(--teal); transition:width .3s; }
  .bar.navy > div { background:var(--navy); }
  .statrow { display:flex; align-items:center; gap:10px; padding:5px 0; }
  .statlabel { font-size:12px; color:var(--ink-soft); width:76px; flex-shrink:0; }
  .statnum { font-size:12px; color:var(--ink-soft); width:60px; text-align:right; flex-shrink:0; }
  .logrow { font-size:13px; padding:6px 0; border-bottom:1px solid var(--line); }
  .logts { color:var(--ink-soft); font-size:12px; margin-right:8px; }
  .sectitle { font-family:Georgia,serif; font-size:16px; margin-bottom:8px; }
  .auth { text-align:center; padding:60px 20px; }
  .auth h1 { font-size:30px; margin-bottom:8px; }
  .topbar { display:flex; justify-content:space-between; align-items:flex-start; gap:10px; }
  .userchip { font-size:12px; color:var(--ink-soft); text-align:right; }
  .userchip a { color:var(--teal); cursor:pointer; text-decoration:underline; }
  .savestate { font-size:12px; color:var(--ink-soft); margin-left:8px; }
  .savestate.err { color:var(--red); }
  #configwarn { background:var(--red-soft); border:1px solid var(--red); color:var(--red); border-radius:10px; padding:14px; margin:20px auto; max-width:600px; font-size:14px; line-height:1.5; }
  code { background:var(--navy-soft); padding:1px 5px; border-radius:4px; font-size:13px; }
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty">Loading…</div></div>

<script type="module">
/* ============================================================
   1. PASTE YOUR FIREBASE CONFIG BELOW (from Firebase console)
   ============================================================ */
const firebaseConfig = {
  apiKey: "AIzaSyD2O7PgqS7TZX0KyBI9AwsPnOVrIq5UHYg",
  authDomain: "work-tracker-fc815.firebaseapp.com",
  projectId: "work-tracker-fc815",
  storageBucket: "work-tracker-fc815.firebasestorage.app",
  messagingSenderId: "145863584725",
  appId: "1:145863584725:web:9b2e2637249e0fe5406b5c"
};
/* ============================================================ */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { initializeFirestore, persistentLocalCache, doc, getDoc, setDoc, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const appEl = document.getElementById("app");

if (firebaseConfig.apiKey.startsWith("PASTE_")) {
  appEl.innerHTML = `<div id="configwarn"><b>Setup needed:</b> open <code>index.html</code> and paste your Firebase config into the block at the top of the &lt;script&gt; section. See the README for the step-by-step guide.</div>`;
  throw new Error("Firebase config not set");
}

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = initializeFirestore(fbApp, { localCache: persistentLocalCache() });

/* ---------- date helpers ---------- */
const iso = d => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
const mondayOf = d => { const c=new Date(d); c.setDate(c.getDate()-((c.getDay()+6)%7)); c.setHours(0,0,0,0); return c; };
const addDays = (d,n) => { const c=new Date(d); c.setDate(c.getDate()+n); return c; };
const DAY_NAMES = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const niceDate = d => d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const niceFull = s => new Date(s+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
const esc = s => s.replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

/* ---------- state ---------- */
let user = null;
let tab = "week";
let viewMonday = mondayOf(new Date());
let viewMonth = new Date(new Date().getFullYear(), new Date().getMonth(), 1);
let week = { days:{}, log:[] };
let planWeek = { days:{}, log:[] };
let monthData = { goals:[] };
let missedList = null;
let progressData = null;
let saveState = "saved";
const todayIso = iso(new Date());
const thisMonday = mondayOf(new Date());
const dow = new Date().getDay();
const isPlanningDay = dow === 5 || dow === 1;

/* ---------- firestore io ---------- */
const weekRef  = m => doc(db, "users", user.uid, "weeks", iso(m));
const monthRef = d => doc(db, "users", user.uid, "months", `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}`);
const loadDoc = async (ref, fallback) => {
  try { const s = await getDoc(ref); return s.exists() ? s.data() : fallback; }
  catch(e){ console.error(e); return fallback; }
};
const saveDoc = async (ref, data) => {
  saveState = "saving"; paintSaveState();
  try { await setDoc(ref, data); saveState = "saved"; }
  catch(e){ console.error(e); saveState = "error"; }
  paintSaveState();
};
function paintSaveState(){
  const el = document.getElementById("savestate");
  if (!el) return;
  el.className = "savestate" + (saveState==="error" ? " err" : "");
  el.textContent = saveState==="saving" ? "· saving…" : saveState==="error" ? "· save failed — check connection" : "";
}

async function mutateWeek(monday, fn, logEntry){
  const isView = iso(monday)===iso(viewMonday), isPlan = iso(monday)===iso(addDays(viewMonday,7));
  let data = isView ? week : isPlan ? planWeek : await loadDoc(weekRef(monday), {days:{},log:[]});
  const next = { days:{...data.days}, log:[...(data.log||[])] };
  fn(next);
  if (logEntry) next.log.unshift({ ts:new Date().toISOString(), text:logEntry });
  if (next.log.length > 400) next.log.length = 400;
  if (isView) week = next;
  if (isPlan) planWeek = next;
  render();
  await saveDoc(weekRef(monday), next);
  return next;
}

/* ---------- task actions (exposed for onclick) ---------- */
const sortByTime = (a,b) => (a.time||"99:99").localeCompare(b.time||"99:99");
const findWeekObj = mIso => iso(viewMonday)===mIso ? week : planWeek;

window.A = {
  setTab(t){ tab=t; if(t==="plan") loadPlan(); if(t==="missed") loadMissed(); if(t==="month") loadMonth(); if(t==="progress") loadProgress(); render(); },
  nav(n){ viewMonday = addDays(viewMonday, n*7); loadWeek(); },
  jumpToday(){ viewMonday = thisMonday; loadWeek(); },
  navMonth(n){ viewMonth = new Date(viewMonth.getFullYear(), viewMonth.getMonth()+n, 1); loadMonth(); },
  add(mIso, dayIso){
    const ti = document.getElementById("in-"+dayIso), tt = document.getElementById("tm-"+dayIso);
    const text = (ti?.value||"").trim(); if(!text) return;
    const time = tt?.value||"";
    mutateWeek(new Date(mIso+"T00:00:00"), d=>{
      d.days[dayIso]=[...(d.days[dayIso]||[]),{id:Date.now()+Math.random().toString(16).slice(2),text,time,status:"pending"}];
    },`Added "${text}"${time?` at ${time}`:""} on ${dayIso}`);
  },
  status(mIso, dayIso, id, st){
    mutateWeek(new Date(mIso+"T00:00:00"), d=>{
      d.days[dayIso]=(d.days[dayIso]||[]).map(t=>t.id===id?{...t,status:t.status===st?"pending":st}:t);
    },`Marked task ${st==="done"?"accomplished":"not accomplished"} on ${dayIso}`);
  },
  del(mIso, dayIso, id){
    const t=(findWeekObj(mIso).days[dayIso]||[]).find(x=>x.id===id);
    mutateWeek(new Date(mIso+"T00:00:00"), d=>{
      d.days[dayIso]=(d.days[dayIso]||[]).filter(x=>x.id!==id);
    },`Removed "${t?.text||"task"}" from ${dayIso}`);
  },
  edit(mIso, dayIso, id){
    const t=(findWeekObj(mIso).days[dayIso]||[]).find(x=>x.id===id); if(!t) return;
    const v=prompt("Edit activity:", t.text);
    if(v===null||!v.trim()||v.trim()===t.text) return;
    mutateWeek(new Date(mIso+"T00:00:00"), d=>{
      d.days[dayIso]=(d.days[dayIso]||[]).map(x=>x.id===id?{...x,text:v.trim()}:x);
    },`Changed "${t.text}" → "${v.trim()}" on ${dayIso}`);
  },
  time(mIso, dayIso, id){
    const t=(findWeekObj(mIso).days[dayIso]||[]).find(x=>x.id===id); if(!t) return;
    const v=prompt("Set time (HH:MM, empty to clear):", t.time||"");
    if(v===null) return;
    mutateWeek(new Date(mIso+"T00:00:00"), d=>{
      d.days[dayIso]=(d.days[dayIso]||[]).map(x=>x.id===id?{...x,time:v.trim()}:x);
    },`Set time ${v.trim()||"(none)"} on ${dayIso}`);
  },
  async reschedule(srcDayIso, id){
    const srcMon = mondayOf(new Date(srcDayIso+"T00:00:00"));
    const src = await loadDoc(weekRef(srcMon),{days:{},log:[]});
    const task = (src.days[srcDayIso]||[]).find(t=>t.id===id); if(!task) return;
    await mutateWeek(srcMon, d=>{ d.days[srcDayIso]=(d.days[srcDayIso]||[]).filter(t=>t.id!==id); },
      `Rescheduled "${task.text}" from ${srcDayIso} to ${todayIso}`);
    await mutateWeek(thisMonday, d=>{
      d.days[todayIso]=[...(d.days[todayIso]||[]),{...task,id:Date.now()+Math.random().toString(16).slice(2),status:"pending"}];
    },`Rescheduled "${task.text}" here from ${srcDayIso}`);
    if(iso(viewMonday)===iso(thisMonday)) await loadWeek(false);
    loadMissed();
  },
  async resolve(srcDayIso, id, st){
    const srcMon = mondayOf(new Date(srcDayIso+"T00:00:00"));
    await mutateWeek(srcMon, d=>{
      d.days[srcDayIso]=(d.days[srcDayIso]||[]).map(t=>t.id===id?{...t,status:st}:t);
    },`Resolved task on ${srcDayIso} as ${st}`);
    if(iso(viewMonday)===iso(srcMon)) await loadWeek(false);
    loadMissed();
  },
  addGoal(){
    const el=document.getElementById("goal-in"); const v=(el?.value||"").trim(); if(!v) return;
    monthData={goals:[...monthData.goals,{id:Date.now()+"",text:v,done:false}]};
    render(); saveDoc(monthRef(viewMonth), monthData);
  },
  toggleGoal(id){
    monthData={goals:monthData.goals.map(g=>g.id===id?{...g,done:!g.done}:g)};
    render(); saveDoc(monthRef(viewMonth), monthData);
  },
  delGoal(id){
    monthData={goals:monthData.goals.filter(g=>g.id!==id)};
    render(); saveDoc(monthRef(viewMonth), monthData);
  },
  async exportAll(){
    const weeks={}, months={};
    (await getDocs(collection(db,"users",user.uid,"weeks"))).forEach(s=>weeks[s.id]=s.data());
    (await getDocs(collection(db,"users",user.uid,"months"))).forEach(s=>months[s.id]=s.data());
    const blob=new Blob([JSON.stringify({exported:new Date().toISOString(),weeks,months},null,2)],{type:"application/json"});
    const a=document.createElement("a");
    a.href=URL.createObjectURL(blob); a.download=`phd-tracker-backup-${todayIso}.json`; a.click();
  },
  signIn(){
    const p=new GoogleAuthProvider();
    signInWithPopup(auth,p).catch(()=>signInWithRedirect(auth,p));
  },
  signOut(){ signOut(auth); }
};

/* ---------- loaders ---------- */
async function loadWeek(showLoading=true){
  if(showLoading){ week={days:{},log:[]}; }
  week = await loadDoc(weekRef(viewMonday), {days:{},log:[]});
  render();
}
async function loadPlan(){
  planWeek = await loadDoc(weekRef(addDays(viewMonday,7)), {days:{},log:[]});
  render();
}
async function loadMonth(){
  monthData = await loadDoc(monthRef(viewMonth), {goals:[]});
  render();
}
async function loadMissed(){
  missedList=null; render();
  const out=[];
  const snap = await getDocs(collection(db,"users",user.uid,"weeks"));
  snap.forEach(s=>{
    const data=s.data();
    for(const [dayIso,tasks] of Object.entries(data.days||{}))
      for(const t of tasks){
        const overdue = t.status==="pending" && dayIso<todayIso;
        if(t.status==="missed"||overdue) out.push({dayIso,task:t,overdue});
      }
  });
  out.sort((a,b)=>a.dayIso.localeCompare(b.dayIso));
  missedList=out; render();
}
async function loadProgress(){
  progressData=null; render();
  const weeks=[], months={};
  const snap = await getDocs(collection(db,"users",user.uid,"weeks"));
  const rows=[];
  snap.forEach(s=>rows.push([s.id,s.data()]));
  rows.sort((a,b)=>a[0].localeCompare(b[0]));
  for(const [id,data] of rows){
    let total=0,done=0,missed=0;
    for(const [dayIso,tasks] of Object.entries(data.days||{})){
      total+=tasks.length;
      done+=tasks.filter(t=>t.status==="done").length;
      missed+=tasks.filter(t=>t.status==="missed").length;
      const mk=dayIso.slice(0,7);
      months[mk]=months[mk]||{total:0,done:0};
      months[mk].total+=tasks.length;
      months[mk].done+=tasks.filter(t=>t.status==="done").length;
    }
    if(total>0) weeks.push({monday:id,total,done,missed});
  }
  progressData={weeks,months}; render();
}

/* ---------- rendering ---------- */
function taskRowHtml(mIso, dayIso, t, showCheckin){
  return `<div class="task">
    <span class="dot ${t.status}"></span>
    <button class="timechip ${t.time?"set":""}" onclick="A.time('${mIso}','${dayIso}','${t.id}')">${t.time||"time"}</button>
    <span class="tasktext ${t.status==="done"?"done":""}">${esc(t.text)}</span>
    ${showCheckin?`
      <button class="ibtn ok ${t.status==="done"?"on":""}" title="Accomplished" onclick="A.status('${mIso}','${dayIso}','${t.id}','done')">✓</button>
      <button class="ibtn no ${t.status==="missed"?"on":""}" title="Not accomplished" onclick="A.status('${mIso}','${dayIso}','${t.id}','missed')">✗</button>`:""}
    <button class="ibtn" title="Edit" onclick="A.edit('${mIso}','${dayIso}','${t.id}')">✎</button>
    <button class="ibtn" title="Delete" onclick="A.del('${mIso}','${dayIso}','${t.id}')">–</button>
  </div>`;
}
function dayCardHtml(monday, index, data, planMode){
  const date=addDays(monday,index), dayIso=iso(date), mIso=iso(monday);
  const tasks=[...(data.days[dayIso]||[])].sort(sortByTime);
  const isToday=dayIso===todayIso, isPast=dayIso<todayIso;
  const showCheckin=!planMode&&(isToday||isPast);
  return `<div class="card ${isToday?"today":""}">
    <div class="dayhead">
      <span class="dayname">${DAY_NAMES[index]}${isToday?`<span class="todaytag">TODAY</span>`:""}</span>
      <span class="datetag">${niceDate(date)}</span>
    </div>
    ${tasks.length===0?`<div class="empty">No activities yet — add one below.</div>`:""}
    ${tasks.map(t=>taskRowHtml(mIso,dayIso,t,showCheckin)).join("")}
    ${showCheckin&&tasks.some(t=>t.status==="pending")?`<div class="hint">End-of-day check-in: mark each activity ✓ or ✗.</div>`:""}
    <div class="addrow">
      <input type="time" id="tm-${dayIso}">
      <input type="text" id="in-${dayIso}" placeholder="Add activity (e.g. write lit review…)"
        onkeydown="if(event.key==='Enter')A.add('${mIso}','${dayIso}')">
      <button class="btn" onclick="A.add('${mIso}','${dayIso}')">Add</button>
    </div>
  </div>`;
}
const barHtml=(pct,navy)=>`<div class="bar ${navy?"navy":""}"><div style="width:${pct}%"></div></div>`;

function render(){
  if(!user){
    appEl.innerHTML=`<div class="auth">
      <div class="eyebrow">Research log</div>
      <h1>PhD Weekly Tracker</h1>
      <p class="sub" style="margin-bottom:20px">Plan daily activities, check in each evening, set monthly goals, and track progress for the whole PhD.</p>
      <button class="btn" onclick="A.signIn()" style="font-size:15px;padding:10px 20px">Sign in with Google</button>
    </div>`;
    return;
  }
  const isCurrentWeek = iso(viewMonday)===iso(thisMonday);
  let stats={total:0,done:0,missed:0};
  for(let i=0;i<7;i++){
    const ts=week.days[iso(addDays(viewMonday,i))]||[];
    stats.total+=ts.length;
    stats.done+=ts.filter(t=>t.status==="done").length;
    stats.missed+=ts.filter(t=>t.status==="missed").length;
  }
  let body="";
  if(tab==="week"){
    body=`<div class="navrow">
        <button class="btn ghost" onclick="A.nav(-1)">← Prev</button>
        <span class="navtitle">Week of ${niceDate(viewMonday)} – ${niceDate(addDays(viewMonday,6))}</span>
        <button class="btn ghost" onclick="A.nav(1)">Next →</button>
      </div>
      ${!isCurrentWeek?`<button class="btn soft" style="margin-bottom:10px" onclick="A.jumpToday()">Jump to current week</button>`:""}
      ${Array.from({length:7},(_,i)=>dayCardHtml(viewMonday,i,week,false)).join("")}`;
  } else if(tab==="plan"){
    const nm=addDays(viewMonday,7);
    body=`<div class="navtitle" style="margin-bottom:6px;text-align:left">Planning week of ${niceDate(nm)} – ${niceDate(addDays(nm,6))}</div>
      ${!isPlanningDay?`<p class="sub" style="margin-bottom:10px">Your rule: fill next week on <b>Friday</b> or <b>Monday</b> — but you can add anytime.</p>`:""}
      ${Array.from({length:7},(_,i)=>dayCardHtml(nm,i,planWeek,true)).join("")}`;
  } else if(tab==="missed"){
    body=`<div class="card"><div class="sectitle">Not accomplished</div>
      <p class="sub" style="margin-bottom:10px">Everything marked ✗ or left unchecked on a past day, across all weeks.</p>`;
    if(missedList===null) body+=`<div class="empty">Scanning all weeks…</div>`;
    else if(missedList.length===0) body+=`<div class="sub" style="color:var(--teal)">Nothing outstanding — everything is accounted for. 🎓</div>`;
    else body+=missedList.map(({dayIso,task,overdue})=>`
      <div class="task" style="flex-wrap:wrap">
        <span class="pill ${overdue?"overdue":"missed"}">${overdue?"unchecked":"missed"} · ${niceFull(dayIso)}${task.time?" "+task.time:""}</span>
        <span class="tasktext">${esc(task.text)}</span>
        <button class="btn ghost" style="border-color:var(--navy);color:var(--navy)" onclick="A.reschedule('${dayIso}','${task.id}')">→ Today</button>
        <button class="btn ghost" style="border-color:var(--teal);color:var(--teal)" onclick="A.resolve('${dayIso}','${task.id}','done')">✓ Did it</button>
        ${overdue?`<button class="btn ghost" style="border-color:var(--red);color:var(--red)" onclick="A.resolve('${dayIso}','${task.id}','missed')">✗ Missed</button>`:""}
      </div>`).join("");
    body+=`</div>`;
  } else if(tab==="month"){
    const done=monthData.goals.filter(g=>g.done).length;
    body=`<div class="card">
      <div class="navrow">
        <button class="btn ghost" onclick="A.navMonth(-1)">←</button>
        <span class="navtitle" style="font-size:17px">${MONTHS[viewMonth.getMonth()]} ${viewMonth.getFullYear()} — bigger goals</span>
        <button class="btn ghost" onclick="A.navMonth(1)">→</button>
      </div>
      ${monthData.goals.length?`<div class="statrow">${barHtml(done/monthData.goals.length*100)}<span class="statnum" style="width:auto">${done}/${monthData.goals.length} done</span></div>`
        :`<div class="empty">Set 2–4 big goals for this month (e.g. "submit chapter 2 draft").</div>`}
      ${monthData.goals.map(g=>`<div class="task">
        <button class="ibtn ok ${g.done?"on":""}" onclick="A.toggleGoal('${g.id}')">${g.done?"✓":""}</button>
        <span class="tasktext ${g.done?"done":""}" style="font-size:15px">${esc(g.text)}</span>
        <button class="ibtn" onclick="A.delGoal('${g.id}')">–</button>
      </div>`).join("")}
      <div class="addrow">
        <input type="text" id="goal-in" placeholder="Add a monthly goal…" onkeydown="if(event.key==='Enter')A.addGoal()">
        <button class="btn" onclick="A.addGoal()">Add</button>
      </div>
    </div>`;
  } else if(tab==="progress"){
    if(progressData===null) body=`<div class="empty">Crunching your history…</div>`;
    else{
      const T=progressData.weeks.reduce((a,w)=>({total:a.total+w.total,done:a.done+w.done,missed:a.missed+w.missed}),{total:0,done:0,missed:0});
      const pct=T.total?Math.round(T.done/T.total*100):0;
      body=`<div class="card"><div class="sectitle">All-time</div>
        <span style="font-family:Georgia,serif;font-size:22px"><b>${pct}%</b></span> accomplished
        <span class="sub" style="margin-left:12px">${T.done} done · ${T.missed} missed · ${T.total} planned · ${progressData.weeks.length} weeks tracked</span>
        <div style="margin-top:10px"><button class="btn ghost" onclick="A.exportAll()">⬇ Export backup (JSON)</button></div>
      </div>
      <div class="card"><div class="sectitle">Week by week (last 16)</div>
        ${progressData.weeks.length===0?`<div class="empty">No tracked weeks yet.</div>`:""}
        ${progressData.weeks.slice(-16).map(w=>`<div class="statrow">
          <span class="statlabel">${niceDate(new Date(w.monday+"T00:00:00"))}</span>
          ${barHtml(w.total?w.done/w.total*100:0)}
          <span class="statnum">${w.done}/${w.total}</span></div>`).join("")}
      </div>
      <div class="card"><div class="sectitle">Month by month</div>
        ${Object.entries(progressData.months).sort(([a],[b])=>a.localeCompare(b)).map(([mk,m])=>`<div class="statrow">
          <span class="statlabel">${MONTHS[parseInt(mk.slice(5))-1].slice(0,3)} ${mk.slice(0,4)}</span>
          ${barHtml(m.total?m.done/m.total*100:0,true)}
          <span class="statnum">${m.done}/${m.total}</span></div>`).join("")}
      </div>`;
    }
  } else if(tab==="log"){
    body=`<div class="card"><div class="sectitle">Changes — week of ${niceDate(viewMonday)}</div>
      ${(week.log||[]).length===0?`<div class="empty">No changes recorded yet for this week.</div>`:""}
      ${(week.log||[]).map(e=>`<div class="logrow"><span class="logts">${new Date(e.ts).toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>${esc(e.text)}</div>`).join("")}
    </div>`;
  }

  appEl.innerHTML=`
    <div class="topbar">
      <header>
        <div class="eyebrow">Research log</div>
        <h1>PhD Weekly Tracker</h1>
        <div class="sub">${stats.total>0
          ?`This week: ${stats.done}/${stats.total} accomplished${stats.missed?`, ${stats.missed} missed`:""}`
          :`Plan your days, check in each evening, plan next week on Friday or Monday.`}
          <span id="savestate" class="savestate"></span>
        </div>
      </header>
      <div class="userchip">${esc(user.displayName||user.email||"")}<br><a onclick="A.signOut()">sign out</a></div>
    </div>
    ${iso(viewMonday)===iso(thisMonday)&&isPlanningDay?`<div class="banner">It's ${DAY_NAMES[(dow+6)%7]} — planning day. Fill next week's activities in <b>Plan next week</b>.</div>`:""}
    <div class="tabs">
      ${[["week","This week"],["plan","Plan next week"],["missed","Not accomplished"],["month","Monthly goals"],["progress","Progress"],["log","Change log"]]
        .map(([id,l])=>`<button class="tab ${tab===id?"on":""}" onclick="A.setTab('${id}')">${l}</button>`).join("")}
    </div>
    ${body}`;
  paintSaveState();
}

onAuthStateChanged(auth, async u=>{
  user=u;
  if(u){ await loadWeek(); } else render();
});
render();
</script>
</body>
</html>
