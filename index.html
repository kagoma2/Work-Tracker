<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffffff">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Work Tracker">
<title>Work Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234F46E5'/><text y='74' x='18' font-size='64' fill='white' font-family='Georgia'>W</text></svg>">
<style>
:root{
  --bg:#F0F2F8; --surface:#FFFFFF; --surface2:#F7F8FC;
  --border:#E2E6F0; --border2:#C8CFDF;
  --ink:#0D1117; --ink2:#2D3748; --ink3:#5A6478; --ink4:#9AA3B5;
  --accent:#4F46E5; --accent2:#EEF2FF; --accent3:#C7D2FE;
  --green:#16A34A; --green2:#DCFCE7; --green3:#BBF7D0;
  --amber:#D97706; --amber2:#FEF3C7;
  --red:#DC2626; --red2:#FEE2E2;
  --r:18px; --r-md:14px; --r-sm:10px; --r-xs:8px;
  --shadow:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 20px rgba(0,0,0,.10);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --font:'Inter',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{font-family:var(--font);background:var(--bg);color:var(--ink);min-height:100vh;
  padding:0 0 calc(80px + env(safe-area-inset-bottom));-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;background:none;font-family:inherit;font-size:inherit;color:inherit}
input,select{font-family:inherit;font-size:inherit;color:var(--ink);background:transparent;border:none;outline:none}
.wrap{max-width:700px;margin:0 auto;padding:0 16px}

/* ── Top bar ── */
.topbar{background:var(--surface);border-bottom:1.5px solid var(--border);
  padding:16px 20px calc(16px + env(safe-area-inset-top,0px));
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:12px}
.app-icon{width:40px;height:40px;border-radius:10px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}
.app-label{font-size:11px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--ink4)}
.app-name{font-size:18px;font-weight:800;color:var(--ink);letter-spacing:-.4px}
.topbar-right{display:flex;align-items:center;gap:8px}
.back-btn{display:flex;align-items:center;gap:6px;font-size:15px;font-weight:600;color:var(--accent);
  padding:8px 14px;border-radius:var(--r-sm);transition:background .15s}
.back-btn:hover{background:var(--accent2)}
.back-btn svg{width:18px;height:18px}
.signout-lnk{font-size:13px;color:var(--ink4);padding:8px 10px;border-radius:var(--r-xs);
  transition:color .15s,background .15s}
.signout-lnk:hover{color:var(--red);background:var(--red2)}

/* ── Bottom nav ── */
.bottomnav{position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:rgba(255,255,255,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1.5px solid var(--border);
  display:flex;justify-content:space-around;
  padding:8px 0 calc(8px + env(safe-area-inset-bottom))}
.bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;
  flex:1;padding:4px 2px;font-size:10px;font-weight:600;color:var(--ink4);
  transition:color .15s;position:relative}
.bnav-item.on{color:var(--accent)}
.bnav-item svg{width:24px;height:24px;stroke-width:1.8}
.bnav-badge{position:absolute;top:0;right:calc(50% - 18px);
  background:var(--red);color:#fff;font-size:9px;font-weight:800;
  min-width:16px;height:16px;border-radius:8px;padding:0 4px;
  display:flex;align-items:center;justify-content:center}
@media(min-width:640px){
  .bottomnav{position:static;background:none;backdrop-filter:none;border:none;
    padding:0;margin-bottom:20px;gap:4px;justify-content:flex-start;flex-wrap:wrap}
  .bnav-item{flex-direction:row;gap:7px;font-size:13px;padding:9px 16px;
    border-radius:var(--r-sm);flex:none;border:1.5px solid transparent}
  .bnav-item.on{background:var(--surface);border-color:var(--border);
    box-shadow:var(--shadow);color:var(--accent)}
  .bnav-item svg{width:17px;height:17px}
  .bnav-badge{top:-4px;right:-4px}
  body{padding-bottom:24px}
}

/* ── Home dashboard ── */
.home-wrap{padding:20px 16px 0}
.now-next-card{background:var(--accent);border-radius:var(--r);padding:20px;
  margin-bottom:16px;color:#fff;box-shadow:var(--shadow-lg)}
.now-next-card .nn-label{font-size:11px;font-weight:700;letter-spacing:.12em;
  text-transform:uppercase;opacity:.7;margin-bottom:8px}
.now-next-card .nn-empty{font-size:15px;opacity:.75;font-weight:500}
.nn-block{margin-bottom:16px}
.nn-block:last-child{margin-bottom:0}
.nn-divider{height:1px;background:rgba(255,255,255,.2);margin:16px 0}
.nn-task{display:flex;align-items:center;gap:10px}
.nn-stripe{width:4px;height:44px;border-radius:3px;flex-shrink:0}
.nn-info{flex:1}
.nn-time{font-size:18px;font-weight:800;letter-spacing:-.3px}
.nn-title{font-size:16px;font-weight:600;margin-top:1px;line-height:1.3}
.nn-cat{font-size:12px;opacity:.75;margin-top:2px;font-weight:500}

.home-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.home-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-md);
  padding:20px 18px;box-shadow:var(--shadow);cursor:pointer;
  transition:transform .15s,box-shadow .15s,border-color .15s;
  display:flex;flex-direction:column;gap:10px;min-height:110px}
.home-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:var(--accent3)}
.home-card:active{transform:scale(.97)}
.home-card-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.home-card-icon svg{width:22px;height:22px}
.home-card-title{font-size:16px;font-weight:700;color:var(--ink)}
.home-card-sub{font-size:13px;color:var(--ink4);margin-top:1px}
.home-card-badge{background:var(--red2);color:var(--red);
  font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px;display:inline-flex;align-self:flex-start}

/* ── Section content ── */
.section-wrap{padding:20px 16px 0}
.section-header{margin-bottom:20px}
.section-title{font-size:22px;font-weight:800;color:var(--ink);letter-spacing:-.4px}
.section-sub{font-size:14px;color:var(--ink3);margin-top:4px}

/* ── Card ── */
.card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-md);
  box-shadow:var(--shadow);overflow:hidden;margin-bottom:14px}
.card.accent-ring{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent2),var(--shadow)}
.card-head{display:flex;align-items:center;justify-content:space-between;
  padding:18px 20px;border-bottom:1.5px solid var(--border)}
.card-title{font-size:17px;font-weight:700;color:var(--ink)}
.card-meta{font-size:13px;color:var(--ink4);font-weight:500}

/* ── Day cards ── */
.day-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1.5px solid var(--border)}
.day-name{font-size:17px;font-weight:700;color:var(--ink);display:flex;align-items:center;gap:8px}
.today-pip{width:9px;height:9px;border-radius:50%;background:var(--accent);flex-shrink:0}
.day-date{font-size:14px;color:var(--ink4);font-weight:500}
.day-prog{display:flex;align-items:center;gap:10px}
.pbar{height:6px;border-radius:6px;background:var(--border);overflow:hidden}
.pbar-fill{height:100%;border-radius:6px;background:var(--accent);transition:width .5s}
.pbar-fill.full{background:var(--green)}
.pbar-num{font-size:13px;color:var(--ink4);white-space:nowrap;font-weight:600}

/* ── Timeline task rows ── */
.task{display:flex;align-items:center;gap:0;
  padding:16px 20px;border-bottom:1.5px solid var(--border);
  position:relative;transition:background .12s;min-height:64px}
.task:hover{background:var(--surface2)}
.task:last-of-type{border-bottom:none}
.task-stripe{position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:0 4px 4px 0}
.task-time-col{width:54px;flex-shrink:0;text-align:right;margin-right:14px}
.task-time-val{font-size:14px;font-weight:800;color:var(--accent);line-height:1}
.task-time-btn{font-size:11px;font-weight:600;color:var(--ink4);
  border:1.5px dashed var(--border2);border-radius:5px;padding:4px 5px;cursor:pointer;
  transition:border-color .15s,color .15s;white-space:nowrap;background:none}
.task-time-btn:hover{border-color:var(--accent);color:var(--accent)}
.task-vline{width:1.5px;background:var(--border);align-self:stretch;margin-right:14px;flex-shrink:0}
.task-body{flex:1;min-width:0}
.task-text{font-size:16px;font-weight:500;color:var(--ink2);line-height:1.4}
.task-text.done{text-decoration:line-through;color:var(--ink4);font-weight:400}
.task-cat{font-size:12px;font-weight:600;margin-top:3px}
.task-btns{display:flex;align-items:center;gap:4px;flex-shrink:0;margin-left:10px}
.tbtn{width:40px;height:40px;border-radius:var(--r-sm);
  display:flex;align-items:center;justify-content:center;
  transition:background .12s,color .12s;color:var(--ink4)}
.tbtn:hover{background:var(--surface2)}
.tbtn.ok{color:#9CA3AF}
.tbtn.ok:hover,.tbtn.ok.on{background:var(--green2);color:var(--green)}
.tbtn.no{color:#9CA3AF}
.tbtn.no:hover,.tbtn.no.on{background:var(--red2);color:var(--red)}
.tbtn.edit-del{opacity:0;transition:opacity .15s,background .12s}
.task:hover .tbtn.edit-del{opacity:1}
@media(hover:none){.tbtn.edit-del{opacity:1}}

/* ── Current time indicator ── */
.time-now-line{display:flex;align-items:center;gap:8px;padding:0 20px;margin:-1px 0}
.time-now-dot{width:10px;height:10px;border-radius:50%;background:var(--red);flex-shrink:0;margin-right:6px}
.time-now-bar{flex:1;height:2px;background:var(--red);opacity:.6}
.time-now-label{font-size:11px;font-weight:700;color:var(--red);white-space:nowrap}

/* ── Add row ── */
.add-row{display:flex;align-items:center;gap:8px;padding:14px 20px;
  background:var(--surface2);border-top:1.5px solid var(--border);flex-wrap:wrap}
.add-time{width:100px;flex-shrink:0;border:1.5px solid var(--border2);border-radius:var(--r-xs);
  padding:10px 10px;font-size:14px;color:var(--ink2);background:var(--surface);transition:border-color .15s}
.add-time:focus{border-color:var(--accent);outline:none}
.add-cat{flex-shrink:0;max-width:140px;border:1.5px solid var(--border2);border-radius:var(--r-xs);
  padding:10px 10px;font-size:14px;color:var(--ink2);background:var(--surface)}
.add-cat option{background:#fff}
.add-inp{flex:1;min-width:140px;border:1.5px solid var(--border2);border-radius:var(--r-xs);
  padding:10px 13px;font-size:15px;color:var(--ink);background:var(--surface);transition:border-color .15s}
.add-inp:focus{border-color:var(--accent);outline:none}
.add-inp::placeholder{color:var(--ink4)}
.add-btn{flex-shrink:0;background:var(--accent);color:#fff;border-radius:var(--r-xs);
  padding:10px 22px;font-size:14px;font-weight:700;transition:opacity .15s,transform .1s}
.add-btn:active{opacity:.85;transform:scale(.97)}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:6px;
  border:1.5px solid var(--border2);border-radius:var(--r-xs);
  padding:10px 18px;font-size:14px;font-weight:600;color:var(--ink2);
  transition:border-color .15s,color .15s,background .12s}
.btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent2)}
.btn.green:hover{border-color:var(--green);color:var(--green);background:var(--green2)}
.btn.red:hover{border-color:var(--red);color:var(--red);background:var(--red2)}
.btn:active{transform:scale(.97)}

/* ── Hero ring ── */
.ring-wrap{position:relative;width:116px;height:116px;flex-shrink:0}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-size:28px;font-weight:800;letter-spacing:-.5px;line-height:1}
.ring-lbl{font-size:11px;font-weight:600;color:var(--ink4);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

/* ── Today hero ── */
.hero-wrap{padding:20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap}
.hero-info{flex:1;min-width:180px;display:flex;flex-direction:column;gap:12px}
.hero-greeting{font-size:13px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink4)}
.hero-title{font-size:20px;font-weight:800;color:var(--ink);letter-spacing:-.4px;line-height:1.2}
.hero-title em{font-style:normal;color:var(--accent)}
.streak-row{display:flex;align-items:center;gap:8px;font-size:17px;font-weight:700}
.streak-sub{font-size:14px;font-weight:400;color:var(--ink3)}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{background:var(--surface2);border:1.5px solid var(--border);border-radius:20px;
  padding:6px 14px;font-size:13px;font-weight:500;color:var(--ink2)}
.chip b{color:var(--ink);font-weight:700}
.chip.warn{background:var(--red2);border-color:#FECACA;color:var(--red)}

/* ── Celebration ── */
.cele{display:flex;align-items:center;gap:16px;
  background:linear-gradient(135deg,#F0FDF4,#EEF2FF);
  border:1.5px solid #BBF7D0;border-radius:var(--r-md);
  padding:18px 20px;margin-bottom:14px}
.cele-icon{font-size:36px;flex-shrink:0}
.cele-title{font-size:17px;font-weight:800;margin-bottom:3px}
.cele-sub{font-size:14px;color:var(--ink2)}

/* ── Notice ── */
.notice{background:var(--amber2);border:1.5px solid #FDE68A;border-radius:var(--r-sm);
  padding:13px 16px;font-size:14px;color:var(--amber);margin-bottom:14px;line-height:1.5}

/* ── Checkin hint ── */
.checkin-hint{padding:12px 20px;font-size:14px;font-weight:500;
  color:var(--amber);background:var(--amber2);border-top:1.5px solid #FDE68A;line-height:1.5}

/* ── Week nav ── */
.week-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;gap:12px}
.week-nav-title{font-size:16px;font-weight:700;text-align:center;flex:1;color:var(--ink)}

/* ── Goals ── */
.goal{display:flex;align-items:center;gap:14px;padding:17px 20px;border-bottom:1.5px solid var(--border)}
.goal:last-child{border-bottom:none}
.goal-box{width:24px;height:24px;border-radius:7px;flex-shrink:0;
  border:2px solid var(--border2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s}
.goal-box.on{background:var(--green);border-color:var(--green)}
.goal-label{flex:1;font-size:16px;font-weight:500;line-height:1.4;color:var(--ink2)}
.goal-label.done{text-decoration:line-through;color:var(--ink4)}

/* ── Month nav ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1.5px solid var(--border)}
.month-title{font-size:18px;font-weight:800;color:var(--ink);text-align:center}
.month-sub{font-size:13px;color:var(--ink4);text-align:center;margin-top:2px}

/* ── Missed ── */
.missed-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r-sm);
  padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
.missed-tags{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.missed-tag{font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px;letter-spacing:.04em}
.missed-tag.red{background:var(--red2);color:var(--red)}
.missed-tag.amber{background:var(--amber2);color:var(--amber)}
.missed-tag.grey{background:var(--surface2);color:var(--ink2);border:1px solid var(--border)}
.missed-name{font-size:16px;font-weight:600;color:var(--ink);margin-bottom:14px;line-height:1.4}
.missed-btns{display:flex;gap:8px;flex-wrap:wrap}

/* ── Stats ── */
.stat-row{display:flex;align-items:center;gap:12px;padding:9px 0}
.stat-lbl{font-size:14px;font-weight:600;width:100px;flex-shrink:0}
.stat-bar{flex:1;height:8px;background:var(--border);border-radius:8px;overflow:hidden}
.stat-fill{height:100%;border-radius:8px;background:var(--accent);transition:width .5s}
.stat-val{font-size:13px;color:var(--ink4);width:44px;text-align:right;font-weight:600;flex-shrink:0}
.alltime-grid{display:flex;gap:0;flex-wrap:wrap;margin-top:16px}
.alltime-stat{flex:1;min-width:80px;padding:16px;border-right:1.5px solid var(--border);text-align:center}
.alltime-stat:last-child{border-right:none}
.alltime-num{font-size:26px;font-weight:800;color:var(--ink);letter-spacing:-.5px}
.alltime-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink4);margin-top:3px}

/* ── Log ── */
.log-row{display:flex;gap:16px;padding:14px 20px;border-bottom:1.5px solid var(--border);font-size:14px}
.log-ts{color:var(--ink4);flex-shrink:0;font-size:12px;padding-top:2px;min-width:80px;font-weight:500}
.log-txt{color:var(--ink2);line-height:1.5}

/* ── Empty state ── */
.empty{padding:40px 20px;text-align:center}
.empty-title{font-size:17px;font-weight:700;color:var(--ink);margin-bottom:6px}
.empty-sub{font-size:14px;color:var(--ink4);line-height:1.6}

/* ── Auth ── */
.auth{min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:28px;text-align:center;padding:40px 24px}
.auth-logo{width:72px;height:72px;border-radius:20px;background:var(--accent);
  display:flex;align-items:center;justify-content:center;
  font-size:36px;font-weight:800;color:#fff;
  box-shadow:0 12px 32px rgba(79,70,229,.35)}
.auth-title{font-size:32px;font-weight:800;color:var(--ink);letter-spacing:-.6px}
.auth-title span{color:var(--accent)}
.auth-sub{font-size:15px;color:var(--ink3);line-height:1.7;max-width:300px}
.google-btn{display:flex;align-items:center;gap:12px;
  background:var(--surface);border:2px solid var(--border2);border-radius:var(--r-sm);
  padding:15px 28px;font-size:16px;font-weight:700;color:var(--ink);
  box-shadow:var(--shadow-md);transition:box-shadow .15s,transform .1s}
.google-btn:hover{box-shadow:var(--shadow-lg)}
.google-btn:active{transform:scale(.97)}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s ease}
@keyframes popIn{0%{opacity:0;transform:scale(.93)}70%{transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}
.pop{animation:popIn .28s ease}
</style>
</head>

const D=d=>`${d.getFullYear()}-${Z(d.getMonth()+1)}-${Z(d.getDate())}`;
const MN=d=>{const c=new Date(d);c.setDate(c.getDate()-((c.getDay()+6)%7));c.setHours(0,0,0,0);return c};
const AD=(d,n)=>{const c=new Date(d);c.setDate(c.getDate()+n);return c};
const DAYS=["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const ND=d=>d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const NF=s=>new Date(s+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
const ESC=s=>String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const GR=()=>{const h=new Date().getHours();return h<12?"Good morning":h<17?"Good afternoon":"Good evening"};
const HHMM=()=>{const n=new Date();return Z(n.getHours())+":"+Z(n.getMinutes())};

async function MW(monday,fn,logTxt){
  const vk=D(viewMon),pk=D(AD(viewMon,7)),mk=D(monday);
  const isV=mk===vk,isP=mk===pk,isT=mk===D(THIS_MON);
  let data=isV?week:isP?planWk:await LD(WR(monday),{days:{},log:[]});
  const next={days:{...data.days},log:[...(data.log||[])]};
  fn(next);
  if(logTxt)next.log.unshift({ts:new Date().toISOString(),text:logTxt});
  if(next.log.length>500)next.log.length=500;
  if(isV)week=next;if(isP)planWk=next;if(isT&&!isV)week=next;
  render();await SV(WR(monday),next);return next;
}
const BT=(a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99");
const FW=mIso=>D(viewMon)===mIso?week:planWk;

async function loadWk(){week=await LD(WR(viewMon),{days:{},log:[]});render()}
async function loadPlan(){planWk=await LD(WR(AD(viewMon,7)),{days:{},log:[]});render()}
async function loadMo(){moData=await LD(MR(viewMonth),{goals:[]});render()}
async function loadMissed(){
  missedList=null;render();
  const snap=await getDocs(collection(db,"users",user.uid,"weeks"));const out=[];
  snap.forEach(s=>{for(const[d,ts]of Object.entries(s.data().days||{}))for(const t of ts){const ov=t.status==="pending"&&d<TODAY;if(t.status==="missed"||ov)out.push({dayIso:d,task:t,overdue:ov})}});
  out.sort((a,b)=>a.dayIso.localeCompare(b.dayIso));missedList=out;missedCount=out.length;render();
}
async function refreshBadge(){
  const snap=await getDocs(collection(db,"users",user.uid,"weeks"));let n=0;
  snap.forEach(s=>{for(const[d,ts]of Object.entries(s.data().days||{}))for(const t of ts)if(t.status==="missed"||(t.status==="pending"&&d<TODAY))n++;});
  missedCount=n;render();
}
async function loadProg(){
  progData=null;render();
  const snap=await getDocs(collection(db,"users",user.uid,"weeks"));
  const rows=[];snap.forEach(s=>rows.push([s.id,s.data()]));rows.sort((a,b)=>a[0].localeCompare(b[0]));
  const weeks=[],months={},cats={};
  for(const[id,data]of rows){let tot=0,done=0,mis=0;for(const[d,ts]of Object.entries(data.days||{})){tot+=ts.length;for(const t of ts){if(t.status==="done"){done++;const c=t.cat||"other";cats[c]=(cats[c]||0)+1}if(t.status==="missed")mis++}const mk=d.slice(0,7);months[mk]=months[mk]||{t:0,d:0};months[mk].t+=ts.length;months[mk].d+=ts.filter(t=>t.status==="done").length}if(tot>0)weeks.push({monday:id,tot,done,mis})}
  progData={weeks,months,cats};render();
}
async function calcStreak(){
  const cache={};
  const gw=async m=>{const k=D(m);if(!cache[k])cache[k]=await LD(WR(m),{days:{}});return cache[k]};
  const ok=async dt=>{const w=await gw(MN(dt)),ts=(w.days[D(dt)]||[]);if(!ts.length)return null;return ts.every(t=>t.status==="done")};
  let s=0,d=new Date(NOW);const st=await ok(d);
  if(st===false){streak=0;render();return}if(st===true)s++;
  d=AD(d,-1);for(let i=0;i<120;i++){const v=await ok(d);if(v===false)break;if(v===true)s++;d=AD(d,-1)}
  streak=s;render();
}

function getNowNext(tasks){
  const hhmm=HHMM();
  const timed=tasks.filter(t=>t.time&&t.status!=="done"&&t.status!=="missed").sort(BT);
  const untimed=tasks.filter(t=>!t.time&&t.status==="pending");
  let current=null;
  for(const t of timed){if(t.time<=hhmm)current=t;else break}
  const next=timed.find(t=>t.time>hhmm)||untimed[0]||null;
  return{current,next};
}

function timelineH(mIso,dayIso,tasks,checkin){
  const sorted=[...tasks].sort(BT);
  const hhmm=HHMM();
  let html="",passedNow=false;
  for(const t of sorted){
    if(!passedNow&&t.time&&t.time>hhmm){
      passedNow=true;
      html+=`<div class="time-now-line"><div class="time-now-dot"></div><div class="time-now-bar"></div><span class="time-now-label">Now · ${hhmm}</span></div>`;
    }
    html+=taskH(mIso,dayIso,t,checkin);
  }
  return html;
}

function dayCardH(monday,i,data,plan){
  const date=AD(monday,i),dayIso=D(date),mIso=D(monday);
  const tasks=[...(data.days[dayIso]||[])];
  const isToday=dayIso===TODAY,isPast=dayIso<TODAY;
  const checkin=!plan&&(isToday||isPast);
  const sfx=(plan?"p":"w")+dayIso;
  const done=tasks.filter(t=>t.status==="done").length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  return`<div class="card ${isToday?"accent-ring pop":""}">
    <div class="day-head">
      <div class="day-name">${DAYS[i]}${isToday?`<span class="today-pip"></span>`:""}</div>
      <div style="display:flex;align-items:center;gap:14px">
        <span class="day-date">${ND(date)}</span>
        ${tasks.length?`<div class="day-prog"><div class="pbar" style="width:80px"><div class="pbar-fill ${pct===100?"full":""}" style="width:${pct}%"></div></div><span class="pbar-num">${done}/${tasks.length}</span></div>`:""}
      </div>
    </div>
    ${tasks.length===0?`<div class="empty"><div class="empty-title">Nothing planned</div><div class="empty-sub">Add an activity below</div></div>`
      :timelineH(mIso,dayIso,tasks,checkin)}
    ${checkin&&tasks.some(t=>t.status==="pending")?`<div class="checkin-hint">Evening check-in — tap ✓ done or ✕ missed for each activity</div>`:""}
    ${addRowH(mIso,dayIso,sfx)}
  </div>`;
}

function ringH(pct,size=116){
  const r=46,c=2*Math.PI*r,off=c*(1-pct/100);
  const col=pct===100?"var(--green)":"var(--accent)";
  return`<div class="ring-wrap" style="width:${size}px;height:${size}px">
    <svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="var(--border)" stroke-width="9"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${col}" stroke-width="9"
        stroke-linecap="round" stroke-dasharray="${c.toFixed(2)}" stroke-dashoffset="${off.toFixed(2)}"
        style="transition:stroke-dashoffset .7s,stroke .3s"/>
    </svg>
    <div class="ring-inner"><span class="ring-pct" style="color:${col}">${pct}%</span><span class="ring-lbl">today</span></div>
  </div>`;
}

  </div>`;

  /* bottom nav */
  const bottomnav=`<nav class="bottomnav">${NAV.map(n=>`<button class="bnav-item ${tab===n.id?"on":""}" onclick="A.go('${n.id}')">
    ${n.ico}${n.label}${n.badge?`<span class="bnav-badge">${n.badge>9?"9+":n.badge}</span>`:""}
  </button>`).join("")}</nav>`;

  let body="";

  if(tab==="home"){
    const nnBlock=(label,t)=>{
      if(!t)return`<div class="nn-block"><div class="nn-label">${label}</div><div class="nn-empty">Nothing scheduled right now</div></div>`;
      return`<div class="nn-block">
        <div class="nn-label">${label}</div>
        <div class="nn-task">
          <div class="nn-stripe" style="background:${t.cat&&CATS[t.cat]?CC(t.cat):"rgba(255,255,255,.4)"}"></div>
          <div class="nn-info">
            ${t.time?`<div class="nn-time">${t.time}</div>`:""}
            <div class="nn-title">${ESC(t.text)}</div>
            ${t.cat&&CATS[t.cat]?`<div class="nn-cat">${CATS[t.cat].label}</div>`:""}
          </div>
        </div>
      </div>`;
    };
    const HOME_CARDS=[
      {id:"today",  title:"Today",        sub:`${tDone}/${todayTs.length} done`,       bg:"#EEF2FF",ic:"#4F46E5",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`},
      {id:"week",   title:"This week",    sub:`${wDone}/${wTot} done · ${ND(THIS_MON)}`, bg:"#F0FDF4",ic:"#16A34A",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`},
      {id:"plan",   title:"Plan",         sub:"Fill next week",                          bg:"#FFF7ED",ic:"#D97706",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>`,extra:PLAN_DAY?`<span class="home-card-badge">Today!</span>`:""  },
      {id:"review", title:"Review",       sub:"Missed & unchecked",                      bg:"#FEF2F2",ic:"#DC2626",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,extra:missedCount?`<span class="home-card-badge">${missedCount} to do</span>`:""  },
      {id:"month",  title:"Monthly goals",sub:`${MONTHS[viewMonth.getMonth()]} ${viewMonth.getFullYear()}`,bg:"#F5F3FF",ic:"#7C3AED",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`},
      {id:"progress",title:"Progress",   sub:"Your long-term stats",                    bg:"#ECFDF5",ic:"#059669",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>`},
    ];
    body=`<div class="home-wrap fade-up">
      <div class="now-next-card">
        ${nnBlock("Current activity",current)}
        <div class="nn-divider"></div>
        ${nnBlock("Next up",next)}
      </div>
      <div class="home-grid">
        ${HOME_CARDS.map(c=>`<div class="home-card" onclick="A.go('${c.id}')">
          <div class="home-card-icon" style="background:${c.bg}"><svg style="color:${c.ic}" viewBox="0 0 24 24" fill="none" stroke="${c.ic}" stroke-width="2" width="22" height="22">${c.icon.match(/<svg[^>]*>(.*)<\/svg>/s)?.[1]||""}</svg></div>
          <div>
            <div class="home-card-title">${c.title}</div>
            <div class="home-card-sub">${c.sub}</div>
          </div>
          ${c.extra||""}
        </div>`).join("")}
      </div>
    </div>`;

  }else if(tab==="today"){
    const mIso=D(THIS_MON);
    body=`<div class="section-wrap fade-up">
      ${allDone?`<div class="cele pop"><span class="cele-icon">🎉</span><div><div class="cele-title">All done for today!</div><div class="cele-sub">Brilliant work — rest well or plan tomorrow.</div></div></div>`:""}
      ${PLAN_DAY?`<div class="notice"><b>It's ${DAYS[(DOW+6)%7]}</b> — planning day. Head to <b>Plan</b> to fill next week.</div>`:""}
      <div class="card ${allDone?"":"accent-ring"}">
        <div class="hero-wrap">
          ${ringH(tPct)}
          <div class="hero-info">
            <div><div class="hero-greeting">${GR()}</div><div class="hero-title">${ESC(user.displayName?.split(" ")[0]||"there")} <em>·</em> ${NF(TODAY)}</div></div>
            <div class="streak-row">🔥 <span>${streak===null?"…":streak}</span> <span class="streak-sub">day streak</span></div>
            <div class="chips">
              <span class="chip"><b>${tDone}</b>/<b>${todayTs.length}</b> today</span>
              <span class="chip"><b>${wDone}</b>/<b>${wTot}</b> this week</span>
              ${missedCount?`<span class="chip warn"><b>${missedCount}</b> to review</span>`:""}
            </div>
          </div>
        </div>
        <div style="border-top:1.5px solid var(--border)">
          ${todayTs.length===0?`<div class="empty"><div class="empty-title">A clear day ahead</div><div class="empty-sub">Add your first activity below</div></div>`:timelineH(mIso,TODAY,todayTs,true)}
        </div>
        ${todayTs.some(t=>t.status==="pending")?`<div class="checkin-hint">Evening check-in — tap ✓ done or ✕ missed</div>`:""}
        ${addRowH(mIso,TODAY,"tod")}
      </div>
    </div>`;

  }else if(tab==="week"){
    body=`<div class="section-wrap fade-up">
      <div class="week-nav">
        <button class="btn" onclick="A.wNav(-1)">← Prev</button>
        <span class="week-nav-title">${ND(viewMon)} — ${ND(AD(viewMon,6))}</span>
        <button class="btn" onclick="A.wNav(1)">Next →</button>
      </div>
      ${!isNow?`<button class="btn" style="margin-bottom:16px" onclick="A.wJump()">↩ Current week</button>`:""}
      ${wTot?`<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
        <div class="pbar" style="flex:1;height:8px"><div class="pbar-fill ${wDone===wTot&&wTot?"full":""}" style="width:${wTot?wDone/wTot*100:0}%"></div></div>
        <span style="font-size:14px;color:var(--ink3);font-weight:600">${wDone}/${wTot} done${wMis?` · ${wMis} missed`:""}</span>
      </div>`:""}
      ${Array.from({length:7},(_,i)=>dayCardH(viewMon,i,week,false)).join("")}
    </div>`;

  }else if(tab==="plan"){
    const nm=AD(viewMon,7);
    body=`<div class="section-wrap fade-up">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
        <div><div class="section-title">Next week</div><div class="section-sub">${ND(nm)} — ${ND(AD(nm,6))}</div></div>
        <button class="btn" onclick="A.copy()">⧉ Copy this week</button>
      </div>
      ${!PLAN_DAY?`<div class="notice">Your rule: plan on <b>Friday</b> or <b>Monday</b> — but you can add anytime.</div>`:""}
      ${Array.from({length:7},(_,i)=>dayCardH(nm,i,planWk,true)).join("")}
    </div>`;

  }else if(tab==="review"){
    body=`<div class="section-wrap fade-up">
      <div class="section-header"><div class="section-title">Review</div><div class="section-sub">Past activities still needing resolution — across your full history.</div></div>
      ${missedList===null?`<div class="empty"><div class="empty-title">Scanning history…</div><div class="empty-sub">Looking through all your weeks</div></div>`
        :!missedList.length?`<div class="card"><div class="empty"><div class="empty-title" style="color:var(--green)">All clear ✓</div><div class="empty-sub">Nothing outstanding — great work.</div></div></div>`
        :missedList.map(({dayIso,task,overdue})=>`<div class="missed-item">
          <div class="missed-tags">
            <span class="missed-tag ${overdue?"amber":"red"}">${overdue?"UNCHECKED":"MISSED"}</span>
            <span class="missed-tag grey">${NF(dayIso)}${task.time?" · "+task.time:""}</span>
            ${task.cat&&CATS[task.cat]?`<span class="missed-tag grey" style="color:${CC(task.cat)}">${CATS[task.cat].label}</span>`:""}
          </div>
          <div class="missed-name">${ESC(task.text)}</div>
          <div class="missed-btns">
            <button class="btn" onclick="A.resch('${dayIso}','${task.id}')">→ Move to today</button>
            <button class="btn green" onclick="A.res('${dayIso}','${task.id}','done')">✓ I did it</button>
            ${overdue?`<button class="btn red" onclick="A.res('${dayIso}','${task.id}','missed')">✕ Missed it</button>`:""}
          </div>
        </div>`).join("")}
    </div>`;

  }else if(tab==="month"){
    const done=moData.goals.filter(g=>g.done).length,tot=moData.goals.length;
    body=`<div class="section-wrap fade-up">
      <div class="card">
        <div class="month-nav">
          <button class="btn" onclick="A.mNav(-1)">← Prev</button>
          <div><div class="month-title">${MONTHS[viewMonth.getMonth()]} ${viewMonth.getFullYear()}</div><div class="month-sub">Monthly goals</div></div>
          <button class="btn" onclick="A.mNav(1)">Next →</button>
        </div>
        ${tot?`<div style="padding:14px 20px 6px;display:flex;align-items:center;gap:12px">
          <div class="pbar" style="flex:1;height:8px"><div class="pbar-fill ${done===tot&&tot?"full":""}" style="width:${tot?done/tot*100:0}%"></div></div>
          <span style="font-size:14px;color:var(--ink3);font-weight:600">${done}/${tot} done</span>
        </div>`:""}
        ${tot===0?`<div class="empty"><div class="empty-title">Set your targets</div><div class="empty-sub">Add 2–4 big goals for this month</div></div>`:""}
        ${moData.goals.map(g=>`<div class="goal">
          <div class="goal-box ${g.done?"on":""}" onclick="A.tGoal('${g.id}')">
            ${g.done?`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`:""}
          </div>
          <span class="goal-label ${g.done?"done":""}">${ESC(g.text)}</span>
          <button class="tbtn" onclick="A.dGoal('${g.id}')"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg></button>
        </div>`).join("")}
        <div class="add-row"><input type="text" class="add-inp" id="goal-in" placeholder="Add a monthly goal…" onkeydown="if(event.key==='Enter')A.addGoal()"><button class="add-btn" onclick="A.addGoal()">Add</button></div>
      </div>
    </div>`;

  }else if(tab==="progress"){
    if(!progData)body=`<div class="section-wrap"><div class="empty"><div class="empty-title">Loading stats</div><div class="empty-sub">Crunching your history…</div></div></div>`;
    else{
      const T=progData.weeks.reduce((a,w)=>({t:a.t+w.tot,d:a.d+w.done,m:a.m+w.mis}),{t:0,d:0,m:0});
      const pct=T.t?Math.round(T.d/T.t*100):0;
      const best=progData.weeks.reduce((b,w)=>{const p=w.tot?w.done/w.tot:0;return p>(b.p||0)?{p,w}:b},{});
      const catTot=Object.values(progData.cats).reduce((a,b)=>a+b,0);
      body=`<div class="section-wrap fade-up">
        <div class="card" style="margin-bottom:14px">
          <div class="card-head"><span class="card-title">All-time</span></div>
          <div style="padding:20px;display:flex;gap:20px;align-items:center;flex-wrap:wrap">
            ${ringH(pct,100)}
            <div class="alltime-grid" style="flex:1">
              <div class="alltime-stat"><div class="alltime-num">${T.d}</div><div class="alltime-lbl">Done</div></div>
              <div class="alltime-stat"><div class="alltime-num">${T.m}</div><div class="alltime-lbl">Missed</div></div>
              <div class="alltime-stat"><div class="alltime-num">${progData.weeks.length}</div><div class="alltime-lbl">Weeks</div></div>
              ${best.w?`<div class="alltime-stat"><div class="alltime-num">${Math.round(best.p*100)}%</div><div class="alltime-lbl">Best week</div></div>`:""}
            </div>
          </div>
          <div style="padding:0 20px 20px"><button class="btn" onclick="A.export()">⬇ Export backup</button></div>
        </div>
        ${catTot?`<div class="card" style="margin-bottom:14px">
          <div class="card-head"><span class="card-title">Work by category</span><span class="card-meta">${catTot} total</span></div>
          <div style="padding:16px 20px">
            ${Object.entries(progData.cats).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="stat-row">
              <span class="stat-lbl" style="color:${CC(c)}">${(CATS[c]||{label:"Other"}).label}</span>
              <div class="stat-bar"><div class="stat-fill" style="width:${n/catTot*100}%;background:${CC(c)}"></div></div>
              <span class="stat-val">${n}</span>
            </div>`).join("")}
          </div>
        </div>`:""}
        <div class="card" style="margin-bottom:14px">
          <div class="card-head"><span class="card-title">Week by week</span><span class="card-meta">Last 16</span></div>
          <div style="padding:16px 20px">
            ${!progData.weeks.length?`<div style="font-size:14px;color:var(--ink4)">No data yet.</div>`:""}
            ${progData.weeks.slice(-16).map(w=>`<div class="stat-row">
              <span class="stat-lbl">${ND(new Date(w.monday+"T00:00:00"))}</span>
              <div class="stat-bar"><div class="stat-fill" style="width:${w.tot?w.done/w.tot*100:0}%;${w.tot&&w.done===w.tot?"background:var(--green)":""}"></div></div>
              <span class="stat-val">${w.done}/${w.tot}</span>
            </div>`).join("")}
          </div>
        </div>
        <div class="card">
          <div class="card-head"><span class="card-title">Month by month</span></div>
          <div style="padding:16px 20px">
            ${Object.entries(progData.months).sort(([a],[b])=>a.localeCompare(b)).map(([mk,m])=>`<div class="stat-row">
              <span class="stat-lbl">${MONTHS[parseInt(mk.slice(5))-1].slice(0,3)} ${mk.slice(0,4)}</span>
              <div class="stat-bar"><div class="stat-fill" style="width:${m.t?m.d/m.t*100:0}%"></div></div>
              <span class="stat-val">${m.d}/${m.t}</span>
            </div>`).join("")}
          </div>
        </div>
      </div>`;
    }
  }

  ROOT.innerHTML=topbar+`<div class="fade-up">${body}</div>`+bottomnav;
  _ps();
}

onAuthStateChanged(auth,async u=>{
  user=u;
  if(u){await loadWk();calcStreak();refreshBadge()}
  else render();
});
render();
</script>
</body>
</html>
