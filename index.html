<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#111318">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Work Tracker">
<title>Work Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%23111318'/><text y='72' x='14' font-size='68'>✦</text></svg>">
<style>
/* ── tokens ─────────────────────────────────────────────── */
:root{
  --bg:#111318; --surface:#1A1D24; --surface2:#22262F; --surface3:#2A2F3A;
  --border:#2C3040; --border2:#363C4E;
  --text:#F0F2F7; --text2:#9299AD; --text3:#5C6278;
  --accent:#6C8EF5; --accent-dim:#1E2540; --accent-glow:rgba(108,142,245,.18);
  --green:#4ADE80; --green-dim:#0F2E1A; --green-glow:rgba(74,222,128,.15);
  --amber:#F59E0B; --amber-dim:#271E08; --red:#F87171; --red-dim:#2A1010;
  --radius:14px; --radius-sm:8px; --radius-xs:6px;
  --shadow:0 2px 12px rgba(0,0,0,.4); --shadow-lg:0 8px 32px rgba(0,0,0,.5);
  --font:'Inter',system-ui,sans-serif; --serif:'Instrument Serif',Georgia,serif;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
/* ── reset ──────────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{font-size:15px;scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;
  padding:20px 16px calc(80px + env(safe-area-inset-bottom));overflow-x:hidden}
input,select,button,textarea{font-family:inherit;font-size:inherit}
button{cursor:pointer;border:none;background:none}
input,select{color:var(--text);background:transparent;border:none;outline:none}
a{color:var(--accent);text-decoration:none}
/* ── layout ─────────────────────────────────────────────── */
.wrap{max-width:680px;margin:0 auto}
/* ── typography ─────────────────────────────────────────── */
.display{font-family:var(--serif);font-size:clamp(28px,6vw,36px);font-weight:400;letter-spacing:-.5px;line-height:1.1}
.display em{font-style:italic;color:var(--accent)}
.label{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text3)}
.caption{font-size:12px;color:var(--text3)}
/* ── cards ──────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:border-color .2s}
.card+.card{margin-top:10px}
.card-body{padding:16px}
.card-head{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
/* ── input row ──────────────────────────────────────────── */
.input-row{display:flex;gap:8px;padding:12px 16px;background:var(--surface2);border-top:1px solid var(--border);flex-wrap:wrap;align-items:center}
.inp{flex:1;min-width:140px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 12px;font-size:14px;color:var(--text);transition:border-color .2s}
.inp:focus{border-color:var(--accent);outline:none}
.inp-time{width:90px;flex:none;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;color:var(--text2)}
.inp-cat{flex:none;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--radius-sm);padding:9px 10px;font-size:13px;color:var(--text2);max-width:120px}
.inp-cat option{background:var(--surface2)}
/* ── buttons ─────────────────────────────────────────────── */
.btn-primary{background:var(--accent);color:#fff;border-radius:var(--radius-sm);padding:9px 16px;font-size:13px;font-weight:600;transition:opacity .15s,transform .1s}
.btn-primary:active{opacity:.8;transform:scale(.97)}
.btn-ghost{border:1px solid var(--border2);color:var(--text2);border-radius:var(--radius-sm);padding:7px 12px;font-size:13px;transition:border-color .2s,color .2s,background .15s}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-ghost:active{background:var(--accent-dim)}
.icon-btn{width:32px;height:32px;border-radius:var(--radius-xs);display:inline-flex;align-items:center;justify-content:center;color:var(--text3);transition:background .15s,color .15s;font-size:14px}
.icon-btn:hover{background:var(--surface3);color:var(--text)}
.icon-btn.check{color:var(--green)}
.icon-btn.check.on{background:var(--green-dim);color:var(--green)}
.icon-btn.cross{color:var(--red)}
.icon-btn.cross.on{background:var(--red-dim);color:var(--red)}
/* ── task rows ───────────────────────────────────────────── */
.task-item{display:flex;align-items:center;gap:8px;padding:11px 16px;border-bottom:1px solid var(--border);transition:background .15s;position:relative}
.task-item:last-child{border-bottom:none}
.task-item:hover{background:var(--surface2)}
.task-cat-bar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:0 2px 2px 0}
.task-text{flex:1;font-size:14px;line-height:1.4;padding-left:4px}
.task-text.done{color:var(--text3);text-decoration:line-through}
.task-meta{font-size:11px;color:var(--text3);margin-left:2px}
.task-time{font-size:12px;color:var(--accent);background:var(--accent-dim);border-radius:4px;padding:2px 7px;cursor:pointer;flex-shrink:0;transition:background .15s}
.task-time:hover{background:var(--accent);color:#fff}
.task-actions{display:flex;gap:2px;flex-shrink:0;opacity:0;transition:opacity .15s}
.task-item:hover .task-actions{opacity:1}
/* always show on touch */
@media(hover:none){.task-actions{opacity:1}}
/* ── status chip ─────────────────────────────────────────── */
.status-chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;padding:3px 9px;border-radius:20px;flex-shrink:0}
.status-chip.done{background:var(--green-dim);color:var(--green)}
.status-chip.missed{background:var(--red-dim);color:var(--red)}
.status-chip.pending{background:var(--surface3);color:var(--text3)}
/* ── hero ring ───────────────────────────────────────────── */
.hero-ring{position:relative;width:100px;height:100px;flex-shrink:0}
.hero-ring svg{transform:rotate(-90deg)}
.hero-ring .inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
.hero-ring .pct-num{font-family:var(--serif);font-size:24px;line-height:1}
.hero-ring .pct-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
/* ── today hero ──────────────────────────────────────────── */
.today-hero{padding:20px;display:flex;gap:20px;align-items:center}
.hero-info{flex:1;display:flex;flex-direction:column;gap:10px}
.streak-row{display:flex;align-items:center;gap:8px}
.streak-num{font-family:var(--serif);font-size:22px;line-height:1}
.streak-label{font-size:13px;color:var(--text2)}
.stat-pills{display:flex;gap:6px;flex-wrap:wrap}
.stat-pill{background:var(--surface3);border-radius:20px;padding:4px 10px;font-size:12px;color:var(--text2)}
.stat-pill b{color:var(--text);font-weight:600}
/* ── progress bar ────────────────────────────────────────── */
.pbar-wrap{display:flex;align-items:center;gap:10px}
.pbar{flex:1;height:5px;background:var(--surface3);border-radius:5px;overflow:hidden}
.pbar-fill{height:100%;border-radius:5px;background:var(--accent);transition:width .5s var(--ease)}
.pbar-fill.green{background:var(--green)}
.pbar-num{font-size:12px;color:var(--text3);width:52px;text-align:right;flex-shrink:0}
/* ── nav bar ─────────────────────────────────────────────── */
.nav{position:fixed;bottom:0;left:0;right:0;background:rgba(17,19,24,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-around;padding:8px 4px calc(8px + env(safe-area-inset-bottom));z-index:100}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:500;color:var(--text3);transition:color .15s,background .15s;flex:1;position:relative}
.nav-item.on{color:var(--accent)}
.nav-item svg{width:22px;height:22px;stroke-width:1.8}
.nav-badge{position:absolute;top:2px;right:calc(50% - 16px);background:var(--red);color:#fff;font-size:9px;min-width:16px;height:16px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 4px;font-weight:700}
/* desktop: top tabs */
@media(min-width:680px){
  body{padding-bottom:24px}
  .nav{position:static;background:none;backdrop-filter:none;border:none;justify-content:flex-start;gap:4px;padding:0;margin-bottom:16px;overflow-x:auto}
  .nav-item{flex-direction:row;gap:7px;padding:8px 14px;font-size:13px;border:1px solid transparent}
  .nav-item.on{background:var(--surface2);border-color:var(--border);color:var(--accent)}
  .nav-item svg{width:16px;height:16px}
  .nav-badge{top:-4px;right:-4px}
}
/* ── day section ─────────────────────────────────────────── */
.day-head{padding:12px 16px 10px;display:flex;align-items:baseline;justify-content:space-between;cursor:pointer}
.day-name{font-weight:600;font-size:14px}
.day-date{font-size:12px;color:var(--text3)}
.today-dot{display:inline-block;width:6px;height:6px;background:var(--accent);border-radius:6px;margin-left:7px;vertical-align:middle}
/* ── weekly nav ──────────────────────────────────────────── */
.week-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:12px}
.week-title{font-size:14px;font-weight:500;text-align:center;flex:1;color:var(--text2)}
/* ── goals ───────────────────────────────────────────────── */
.goal-item{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid var(--border)}
.goal-item:last-child{border-bottom:none}
.goal-check{width:20px;height:20px;border-radius:5px;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:background .15s,border-color .15s}
.goal-check.on{background:var(--green);border-color:var(--green)}
.goal-text{flex:1;font-size:14px}
.goal-text.done{text-decoration:line-through;color:var(--text3)}
/* ── month nav ───────────────────────────────────────────── */
.month-nav{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)}
/* ── celebration ─────────────────────────────────────────── */
.cele{background:linear-gradient(135deg,var(--green-dim),var(--accent-dim));border:1px solid rgba(74,222,128,.2);border-radius:var(--radius);padding:16px;margin-bottom:10px;display:flex;align-items:center;gap:12px}
.cele-icon{font-size:28px;line-height:1}
.cele-text b{display:block;font-size:15px;font-weight:600;margin-bottom:2px}
.cele-text span{font-size:13px;color:var(--text2)}
/* ── missed pills ────────────────────────────────────────── */
.missed-item{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;margin-bottom:8px}
.missed-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.missed-tag{font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500}
.missed-tag.old{background:var(--red-dim);color:var(--red)}
.missed-tag.stale{background:var(--amber-dim);color:var(--amber)}
.missed-name{font-size:14px;margin-bottom:10px;line-height:1.4}
.missed-actions{display:flex;gap:6px;flex-wrap:wrap}
/* ── progress ────────────────────────────────────────────── */
.stat-row{display:flex;align-items:center;gap:12px;padding:7px 0}
.stat-lbl{font-size:13px;color:var(--text2);width:84px;flex-shrink:0}
/* ── empty state ─────────────────────────────────────────── */
.empty-state{padding:32px 16px;text-align:center;color:var(--text3);font-size:14px}
.empty-state strong{display:block;font-size:16px;font-weight:500;color:var(--text2);margin-bottom:6px}
/* ── auth ────────────────────────────────────────────────── */
.auth-screen{min-height:calc(100vh - 40px);display:flex;align-items:center;justify-content:center;flex-direction:column;text-align:center;gap:20px;padding:40px 20px}
.sign-btn{display:flex;align-items:center;gap:10px;background:#fff;color:#111;border-radius:10px;padding:12px 22px;font-size:15px;font-weight:600;transition:transform .1s,box-shadow .15s}
.sign-btn:hover{box-shadow:0 4px 20px rgba(255,255,255,.15)}
.sign-btn:active{transform:scale(.97)}
.google-logo{width:20px;height:20px}
/* ── divider ─────────────────────────────────────────────── */
.divider{height:1px;background:var(--border);margin:0}
/* ── log ─────────────────────────────────────────────────── */
.log-row{padding:10px 16px;border-bottom:1px solid var(--border);font-size:13px;display:flex;gap:10px}
.log-time{color:var(--text3);flex-shrink:0;font-size:12px;padding-top:1px}
/* ── notice banner ───────────────────────────────────────── */
.notice{background:var(--amber-dim);border:1px solid rgba(245,158,11,.2);border-radius:var(--radius-sm);padding:10px 14px;font-size:13px;color:var(--amber);margin-bottom:10px}
/* ── animations ──────────────────────────────────────────── */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .3s var(--ease)}
@keyframes pop{0%{transform:scale(.85);opacity:0}60%{transform:scale(1.05)}100%{transform:scale(1);opacity:1}}
.pop{animation:pop .28s var(--ease)}
/* ── utility ─────────────────────────────────────────────── */
.flex{display:flex}.flex-1{flex:1}.items-center{align-items:center}.gap-2{gap:8px}.gap-3{gap:12px}.mt-1{margin-top:4px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}
.text-2{color:var(--text2)}.text-3{color:var(--text3)}.fw-5{font-weight:500}.fw-6{font-weight:600}
</style>
</head>
<body>
<div class="wrap" id="app"><div class="empty-state"><strong>Loading</strong>Starting up…</div></div>

<script type="module">
/* ── Firebase config ─────────────────────────────────────── */
const firebaseConfig = {
  apiKey: "AIzaSyD2O7PgqS7TZX0KyBI9AwsPnOVrIq5UHYg",
  authDomain: "work-tracker-fc815.firebaseapp.com",
  projectId: "work-tracker-fc815",
  storageBucket: "work-tracker-fc815.firebasestorage.app",
  messagingSenderId: "145863584725",
  appId: "1:145863584725:web:9b2e2637249e0fe5406b5c"
};
/* ────────────────────────────────────────────────────────── */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, onAuthStateChanged, signOut }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { initializeFirestore, persistentLocalCache, doc, getDoc, setDoc, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = initializeFirestore(fbApp, { localCache: persistentLocalCache() });
const root  = document.getElementById("app");

/* ── helpers ────────────────────────────────────────────── */
const isoDate = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const pad = n => String(n).padStart(2,"0");
const monday = d => { const c=new Date(d); c.setDate(c.getDate()-((c.getDay()+6)%7)); c.setHours(0,0,0,0); return c; };
const addD = (d,n) => { const c=new Date(d); c.setDate(c.getDate()+n); return c; };
const DAYS = ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday","Sunday"];
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
const niceD = d => d.toLocaleDateString("en-GB",{day:"numeric",month:"short"});
const niceFullD = s => new Date(s+"T00:00:00").toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short",year:"numeric"});
const esc = s => String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

const CATS = {
  deep:    {label:"Deep work",  color:"#6C8EF5"},
  writing: {label:"Writing",    color:"#4ADE80"},
  meeting: {label:"Meeting",    color:"#F59E0B"},
  admin:   {label:"Admin",      color:"#9299AD"},
  learning:{label:"Learning",   color:"#C084FC"},
  personal:{label:"Personal",   color:"#F87171"},
};
const catC = k => (CATS[k]||{}).color||"var(--border2)";

const greet = () => { const h=new Date().getHours(); return h<12?"Good morning":h<17?"Good afternoon":"Good evening"; };

/* ── state ──────────────────────────────────────────────── */
let user=null, tab="today";
const today = new Date(), todayIso=isoDate(today), thisMon=monday(today);
const dow = today.getDay(), isPlanDay = dow===5||dow===1;
let viewMon=new Date(thisMon), viewMonth=new Date(today.getFullYear(),today.getMonth(),1);
let week={days:{},log:[]}, planWk={days:{},log:[]}, monthData={goals:[]};
let missedList=null, missedCount=0, progressData=null, streak=null;
let saveState="saved";

/* ── firestore ──────────────────────────────────────────── */
const wkRef  = m => doc(db,"users",user.uid,"weeks",isoDate(m));
const moRef  = d => doc(db,"users",user.uid,"months",`${d.getFullYear()}-${pad(d.getMonth()+1)}`);
const load   = async (ref,fb) => { try{const s=await getDoc(ref);return s.exists()?s.data():fb}catch(e){console.error(e);return fb} };
const save   = async (ref,data) => {
  saveState="saving"; paintSave();
  try{await setDoc(ref,data);saveState="saved"}catch(e){console.error(e);saveState="error"}
  paintSave();
};

function paintSave(){
  const el=document.getElementById("ss"); if(!el)return;
  el.textContent=saveState==="saving"?"Saving…":saveState==="error"?"Save failed":"";
  el.style.color=saveState==="error"?"var(--red)":"var(--text3)";
}

async function mutW(mon,fn,log){
  const isV=isoDate(mon)===isoDate(viewMon), isP=isoDate(mon)===isoDate(addD(viewMon,7)), isT=isoDate(mon)===isoDate(thisMon);
  let data=isV?week:isP?planWk:await load(wkRef(mon),{days:{},log:[]});
  const next={days:{...data.days},log:[...(data.log||[])]};
  fn(next);
  if(log)next.log.unshift({ts:new Date().toISOString(),text:log});
  if(next.log.length>500)next.log.length=500;
  if(isV)week=next; if(isP)planWk=next; if(isT&&!isV)week=next;
  render(); await save(wkRef(mon),next); return next;
}
const findW = mIso => isoDate(viewMon)===mIso?week:planWk;
const byTime = (a,b)=>(a.time||"99:99").localeCompare(b.time||"99:99");

/* ── loaders ────────────────────────────────────────────── */
async function loadWk(){week=await load(wkRef(viewMon),{days:{},log:[]});render()}
async function loadPlan(){planWk=await load(wkRef(addD(viewMon,7)),{days:{},log:[]});render()}
async function loadMo(){monthData=await load(moRef(viewMonth),{goals:[]});render()}

async function loadMissed(){
  missedList=null;render();
  const snap=await getDocs(collection(db,"users",user.uid,"weeks"));
  const out=[];
  snap.forEach(s=>{ for(const[d,ts] of Object.entries(s.data().days||{})) for(const t of ts){
    const ov=t.status==="pending"&&d<todayIso;
    if(t.status==="missed"||ov)out.push({dayIso:d,task:t,overdue:ov});
  }});
  out.sort((a,b)=>a.dayIso.localeCompare(b.dayIso));
  missedList=out;missedCount=out.length;render();
}
async function refreshBadge(){
  const snap=await getDocs(collection(db,"users",user.uid,"weeks"));
  let n=0;
  snap.forEach(s=>{ for(const[d,ts] of Object.entries(s.data().days||{})) for(const t of ts)
    if(t.status==="missed"||(t.status==="pending"&&d<todayIso))n++; });
  missedCount=n;render();
}
async function loadProgress(){
  progressData=null;render();
  const snap=await getDocs(collection(db,"users",user.uid,"weeks"));
  const rows=[];snap.forEach(s=>rows.push([s.id,s.data()]));rows.sort((a,b)=>a[0].localeCompare(b[0]));
  const weeks=[],months={},cats={};
  for(const[id,data] of rows){
    let tot=0,done=0,mis=0;
    for(const[d,tasks] of Object.entries(data.days||{})){
      tot+=tasks.length;
      for(const t of tasks){
        if(t.status==="done"){done++;const c=t.cat||"other";cats[c]=(cats[c]||0)+1}
        if(t.status==="missed")mis++;
      }
      const mk=d.slice(0,7);months[mk]=months[mk]||{t:0,d:0};months[mk].t+=tasks.length;months[mk].d+=tasks.filter(t=>t.status==="done").length;
    }
    if(tot>0)weeks.push({monday:id,tot,done,mis});
  }
  progressData={weeks,months,cats};render();
}
async function calcStreak(){
  const cache={};
  const gw=async m=>{const k=isoDate(m);if(!cache[k])cache[k]=await load(wkRef(m),{days:{}});return cache[k]};
  const dayOk=async dt=>{ const w=await gw(monday(dt)),ts=(w.days[isoDate(dt)]||[]);
    if(!ts.length)return null; return ts.every(t=>t.status==="done"); };
  let s=0,d=new Date(today);
  const tState=await dayOk(d);
  if(tState===false){streak=0;render();return}
  if(tState===true)s++;
  d=addD(d,-1);
  for(let i=0;i<120;i++){const st=await dayOk(d);if(st===false)break;if(st===true)s++;d=addD(d,-1)}
  streak=s;render();
}

/* ── actions (global) ───────────────────────────────────── */
window.A={
  tab(t){tab=t;if(t==="plan")loadPlan();if(t==="review")loadMissed();if(t==="month")loadMo();if(t==="progress")loadProgress();render();window.scrollTo({top:0,behavior:"smooth"})},
  navWk(n){viewMon=addD(viewMon,n*7);loadWk()},
  jumpNow(){viewMon=new Date(thisMon);loadWk()},
  navMo(n){viewMonth=new Date(viewMonth.getFullYear(),viewMonth.getMonth()+n,1);loadMo()},
  add(mIso,dayIso,sfx){
    const ti=document.getElementById("in-"+sfx),tt=document.getElementById("tm-"+sfx),tc=document.getElementById("ct-"+sfx);
    const text=(ti?.value||"").trim();if(!text)return;
    const time=tt?.value||"",cat=tc?.value||"";
    ti.value="";
    mutW(new Date(mIso+"T00:00:00"),d=>{
      d.days[dayIso]=[...(d.days[dayIso]||[]),{id:Date.now()+Math.random().toString(16).slice(2),text,time,cat,status:"pending"}];
    },`Added "${text}"${time?` at ${time}`:""} on ${dayIso}`);
  },
  status(mIso,dayIso,id,st){
    mutW(new Date(mIso+"T00:00:00"),d=>{
      d.days[dayIso]=(d.days[dayIso]||[]).map(t=>t.id===id?{...t,status:t.status===st?"pending":st}:t);
    },`Marked task ${st==="done"?"done":"missed"} on ${dayIso}`).then(()=>{if(dayIso===todayIso){streak=null;calcStreak()}refreshBadge()});
  },
  del(mIso,dayIso,id){
    const t=(findW(mIso).days[dayIso]||[]).find(x=>x.id===id);
    if(t&&!confirm(`Delete "${t.text}"?`))return;
    mutW(new Date(mIso+"T00:00:00"),d=>{d.days[dayIso]=(d.days[dayIso]||[]).filter(x=>x.id!==id)},`Removed "${t?.text}" from ${dayIso}`);
  },
  edit(mIso,dayIso,id){
    const t=(findW(mIso).days[dayIso]||[]).find(x=>x.id===id);if(!t)return;
    const v=prompt("Edit activity:",t.text);if(v===null||!v.trim())return;
    mutW(new Date(mIso+"T00:00:00"),d=>{d.days[dayIso]=(d.days[dayIso]||[]).map(x=>x.id===id?{...x,text:v.trim()}:x)},`Edited task on ${dayIso}`);
  },
  setTime(mIso,dayIso,id){
    const t=(findW(mIso).days[dayIso]||[]).find(x=>x.id===id);if(!t)return;
    const v=prompt("Set time (HH:MM, blank to clear):",t.time||"");if(v===null)return;
    mutW(new Date(mIso+"T00:00:00"),d=>{d.days[dayIso]=(d.days[dayIso]||[]).map(x=>x.id===id?{...x,time:v.trim()}:x)},`Set time on ${dayIso}`);
  },
  async copyWk(){
    if(!confirm("Copy this week's activities into next week? Statuses reset to pending."))return;
    const src=isoDate(viewMon)===isoDate(thisMon)?week:await load(wkRef(thisMon),{days:{},log:[]});
    const nm=addD(viewMon,7);
    await mutW(nm,d=>{
      for(let i=0;i<7;i++){
        const from=isoDate(addD(thisMon,i)),to=isoDate(addD(nm,i));
        const tasks=(src.days[from]||[]).map(t=>({...t,id:Date.now()+Math.random().toString(16).slice(2),status:"pending"}));
        if(tasks.length)d.days[to]=[...(d.days[to]||[]),...tasks];
      }
    },"Copied week plan");
  },
  async reschedule(srcDayIso,id){
    const srcMon=monday(new Date(srcDayIso+"T00:00:00"));
    const src=await load(wkRef(srcMon),{days:{},log:[]});
    const task=(src.days[srcDayIso]||[]).find(t=>t.id===id);if(!task)return;
    await mutW(srcMon,d=>{d.days[srcDayIso]=(d.days[srcDayIso]||[]).filter(t=>t.id!==id)},`Rescheduled "${task.text}" to today`);
    await mutW(thisMon,d=>{d.days[todayIso]=[...(d.days[todayIso]||[]),{...task,id:Date.now()+Math.random().toString(16).slice(2),status:"pending"}]},`Rescheduled "${task.text}" from ${srcDayIso}`);
    if(isoDate(viewMon)===isoDate(thisMon))await loadWk();
    loadMissed();
  },
  async resolve(srcDayIso,id,st){
    const srcMon=monday(new Date(srcDayIso+"T00:00:00"));
    await mutW(srcMon,d=>{d.days[srcDayIso]=(d.days[srcDayIso]||[]).map(t=>t.id===id?{...t,status:st}:t)},`Resolved task as ${st}`);
    if(isoDate(viewMon)===isoDate(srcMon))await loadWk();
    loadMissed();
  },
  addGoal(){
    const el=document.getElementById("goal-inp");const v=(el?.value||"").trim();if(!v)return;
    monthData={goals:[...monthData.goals,{id:Date.now()+"",text:v,done:false}]};
    el.value="";render();save(moRef(viewMonth),monthData);
  },
  toggleGoal(id){monthData={goals:monthData.goals.map(g=>g.id===id?{...g,done:!g.done}:g)};render();save(moRef(viewMonth),monthData)},
  delGoal(id){if(!confirm("Delete this goal?"))return;monthData={goals:monthData.goals.filter(g=>g.id!==id)};render();save(moRef(viewMonth),monthData)},
  async export(){
    const wks={},mos={};
    (await getDocs(collection(db,"users",user.uid,"weeks"))).forEach(s=>wks[s.id]=s.data());
    (await getDocs(collection(db,"users",user.uid,"months"))).forEach(s=>mos[s.id]=s.data());
    const blob=new Blob([JSON.stringify({app:"work-tracker",exported:new Date().toISOString(),weeks:wks,months:mos},null,2)],{type:"application/json"});
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=`work-tracker-${todayIso}.json`;a.click();
  },
  signIn(){const p=new GoogleAuthProvider();signInWithPopup(auth,p).catch(()=>signInWithRedirect(auth,p))},
  signOut(){if(confirm("Sign out?"))signOut(auth)}
};

/* ── html builders ──────────────────────────────────────── */
const catOptHTML = sfx => `<select class="inp-cat" id="ct-${sfx}" title="Category">
  <option value="">Category</option>
  ${Object.entries(CATS).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("")}
</select>`;

const taskHTML = (mIso,dayIso,t,checkin) => `
<div class="task-item">
  <div class="task-cat-bar" style="background:${catC(t.cat)}"></div>
  ${t.time?`<span class="task-time" onclick="A.setTime('${mIso}','${dayIso}','${t.id}')">${t.time}</span>`
    :`<span class="task-time" style="opacity:.3" onclick="A.setTime('${mIso}','${dayIso}','${t.id}')">+time</span>`}
  <span class="task-text ${t.status==="done"?"done":""}">${esc(t.text)}${t.cat&&CATS[t.cat]?`<span class="task-meta"> · ${CATS[t.cat].label}</span>`:""}</span>
  ${checkin?`
    <button class="icon-btn check ${t.status==="done"?"on":""}" onclick="A.status('${mIso}','${dayIso}','${t.id}','done')" title="Mark done">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    </button>
    <button class="icon-btn cross ${t.status==="missed"?"on":""}" onclick="A.status('${mIso}','${dayIso}','${t.id}','missed')" title="Mark missed">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" width="16" height="16"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>`:""}
  <div class="task-actions">
    <button class="icon-btn" onclick="A.edit('${mIso}','${dayIso}','${t.id}')" title="Edit">✎</button>
    <button class="icon-btn" onclick="A.del('${mIso}','${dayIso}','${t.id}')" title="Delete">✕</button>
  </div>
</div>`;

const addRowHTML = (mIso,dayIso,sfx) => `
<div class="input-row">
  <input type="time" class="inp-time" id="tm-${sfx}">
  ${catOptHTML(sfx)}
  <input type="text" class="inp" id="in-${sfx}" placeholder="Add activity…" onkeydown="if(event.key==='Enter')A.add('${mIso}','${dayIso}','${sfx}')">
  <button class="btn-primary" onclick="A.add('${mIso}','${dayIso}','${sfx}')">Add</button>
</div>`;

function dayCardHTML(mon,i,data,plan){
  const date=addD(mon,i),dayIso=isoDate(date),mIso=isoDate(mon);
  const tasks=[...(data.days[dayIso]||[])].sort(byTime);
  const isToday=dayIso===todayIso,isPast=dayIso<todayIso;
  const checkin=!plan&&(isToday||isPast);
  const sfx=(plan?"p":"w")+dayIso;
  const done=tasks.filter(t=>t.status==="done").length;
  const pct=tasks.length?Math.round(done/tasks.length*100):0;
  return `<div class="card ${isToday?"pop":""}" style="${isToday?"border-color:var(--accent)":""}">
    <div class="day-head">
      <div>
        <span class="day-name">${DAYS[i]}${isToday?`<span class="today-dot"></span>`:""}
        </span>
        <div class="day-date caption">${niceD(date)}</div>
      </div>
      ${tasks.length?`<div class="pbar-wrap" style="width:120px">
        <div class="pbar"><div class="pbar-fill ${pct===100?"green":""}" style="width:${pct}%"></div></div>
        <span class="pbar-num">${done}/${tasks.length}</span>
      </div>`:""}
    </div>
    ${tasks.length===0?`<div class="empty-state" style="padding:16px"><strong>Nothing planned</strong>Add an activity below</div>`:tasks.map(t=>taskHTML(mIso,dayIso,t,checkin)).join("")}
    ${checkin&&tasks.some(t=>t.status==="pending")?`<div style="padding:8px 16px;font-size:12px;color:var(--amber);border-top:1px solid var(--border)">Check in — mark each activity done or missed</div>`:""}
    ${addRowHTML(mIso,dayIso,sfx)}
  </div>`;
}

function ringHTML(pct){
  const r=42,c=2*Math.PI*r,off=c*(1-pct/100);
  return `<div class="hero-ring">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="var(--surface3)" stroke-width="8"/>
      <circle cx="50" cy="50" r="${r}" fill="none" stroke="${pct===100?"var(--green)":"var(--accent)"}" stroke-width="8"
        stroke-linecap="round" stroke-dasharray="${c.toFixed(1)}" stroke-dashoffset="${off.toFixed(1)}"
        style="transition:stroke-dashoffset .7s var(--ease),stroke .4s"/>
    </svg>
    <div class="inner">
      <span class="pct-num">${pct}%</span>
      <span class="pct-lbl">today</span>
    </div>
  </div>`;
}

/* ── render ─────────────────────────────────────────────── */
function render(){
  if(!user){
    root.innerHTML=`<div class="auth-screen fade-up">
      <div class="label">Daily planning · Weekly review · Long-term progress</div>
      <div class="display" style="margin-top:12px">Your work,<br><em>beautifully tracked</em></div>
      <p style="color:var(--text2);font-size:14px;line-height:1.6;max-width:320px">Plan daily activities, check in each evening, set monthly goals, and watch your progress build across your entire career.</p>
      <button class="sign-btn" onclick="A.signIn()">
        <svg class="google-logo" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
    </div>`;
    return;
  }

  /* stats */
  const todayTasks=[...(week.days[todayIso]||[])].sort(byTime);
  const tDone=todayTasks.filter(t=>t.status==="done").length;
  const tPct=todayTasks.length?Math.round(tDone/todayTasks.length*100):0;
  const allDone=todayTasks.length>0&&todayTasks.every(t=>t.status==="done");
  let wTot=0,wDone=0,wMis=0;
  for(let i=0;i<7;i++){const ts=week.days[isoDate(addD(viewMon,i))]||[];wTot+=ts.length;wDone+=ts.filter(t=>t.status==="done").length;wMis+=ts.filter(t=>t.status==="missed").length}
  const isNow=isoDate(viewMon)===isoDate(thisMon);

  /* nav items */
  const NAV=[
    {id:"today",label:"Today",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/><circle cx="12" cy="16" r="2" fill="currentColor" stroke="none"/></svg>`},
    {id:"week", label:"Week", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>`},
    {id:"plan", label:"Plan", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`},
    {id:"review",label:"Review",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>`,badge:missedCount},
    {id:"month",label:"Goals", icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>`},
    {id:"progress",label:"Stats",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>`},
    {id:"log",label:"Log",icon:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`},
  ];
  const navHTML=NAV.map(n=>`<button class="nav-item ${tab===n.id?"on":""}" onclick="A.tab('${n.id}')">
    ${n.icon}${n.label}${n.badge?`<span class="nav-badge">${n.badge>9?"9+":n.badge}</span>`:""}
  </button>`).join("");

  /* body */
  let body="";
  if(tab==="today"){
    const mIso=isoDate(thisMon);
    body=`${allDone?`<div class="cele pop"><span class="cele-icon">🎉</span><div class="cele-text"><b>All done for today!</b><span>Brilliant work — rest well or plan tomorrow.</span></div></div>`:""}
    ${isPlanDay?`<div class="notice">It's ${DAYS[(dow+6)%7]} — planning day. Head to <b>Plan</b> to fill next week.</div>`:""}
    <div class="card">
      <div class="today-hero">
        ${ringHTML(tPct)}
        <div class="hero-info">
          <div>
            <div class="label">${greet()}${user.displayName?", "+esc(user.displayName.split(" ")[0]):""}</div>
            <div style="font-family:var(--serif);font-size:18px;margin-top:2px">${niceFullD(todayIso)}</div>
          </div>
          <div class="streak-row">
            <span style="font-size:20px">🔥</span>
            <span class="streak-num">${streak===null?"…":streak}</span>
            <span class="streak-label">day streak</span>
          </div>
          <div class="stat-pills">
            <span class="stat-pill"><b>${tDone}</b>/<b>${todayTasks.length}</b> today</span>
            <span class="stat-pill"><b>${wDone}</b>/<b>${wTot}</b> this week</span>
            ${missedCount?`<span class="stat-pill" style="color:var(--red)"><b>${missedCount}</b> to review</span>`:""}
          </div>
        </div>
      </div>

      ${todayTasks.some(t=>t.status==="pending")?`<div style="padding:8px 16px;font-size:12px;color:var(--amber);border-top:1px solid var(--border)">Evening check-in — mark each activity ✓ done or ✕ missed</div>`:""}

  }else if(tab==="week"){
    body=`<div class="week-nav">

      <button class="btn-ghost" onclick="A.navWk(1)">Next →</button>
    </div>
    ${!isNow?`<button class="btn-ghost" style="margin-bottom:10px" onclick="A.jumpNow()">Jump to current week</button>`:""}
    ${wTot?`<div class="pbar-wrap" style="margin-bottom:12px">
      <div class="pbar" style="height:7px"><div class="pbar-fill ${wTot&&wDone===wTot?"green":""}" style="width:${wTot?wDone/wTot*100:0}%"></div></div>
      <span class="pbar-num">${wDone}/${wTot} done</span>
    </div>`:""}
    ${Array.from({length:7},(_,i)=>dayCardHTML(viewMon,i,week,false)).join("")}`;

  }else if(tab==="plan"){
    const nm=addD(viewMon,7);
    body=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;gap:8px">
      <div><div class="fw-6">Next week</div><div class="caption">${niceD(nm)} — ${niceD(addD(nm,6))}</div></div>
      <button class="btn-ghost" onclick="A.copyWk()">⧉ Copy this week</button>

    ${Array.from({length:7},(_,i)=>dayCardHTML(nm,i,planWk,true)).join("")}`;

  }else if(tab==="review"){
    body=`<div style="margin-bottom:12px"><div class="fw-6" style="font-size:16px">Review</div><div class="caption">Activities that need resolving from past days.</div></div>`;
    if(missedList===null) body+=`<div class="empty-state"><strong>Scanning your history</strong>Looking through all weeks…</div>`;
    else if(!missedList.length) body+=`<div class="card"><div class="empty-state" style="padding:32px"><strong style="color:var(--green)">All clear ✓</strong>Nothing outstanding — great work.</div></div>`;

      <div class="missed-item">
        <div class="missed-meta">
          <span class="missed-tag ${overdue?"stale":"old"}">${overdue?"Unchecked":"Missed"}</span>

          ${task.cat&&CATS[task.cat]?`<span class="missed-tag" style="background:var(--surface3);color:${catC(task.cat)}">${CATS[task.cat].label}</span>`:""}

          <button class="btn-ghost" style="color:var(--green);border-color:var(--green)" onclick="A.resolve('${dayIso}','${task.id}','done')">✓ I did it</button>
          ${overdue?`<button class="btn-ghost" style="color:var(--red);border-color:var(--red)" onclick="A.resolve('${dayIso}','${task.id}','missed')">✕ Missed it</button>`:""}
        </div>
      </div>`).join("");

  }else if(tab==="month"){
    const done=monthData.goals.filter(g=>g.done).length,tot=monthData.goals.length;
    body=`<div class="card">
      <div class="month-nav">
        <button class="btn-ghost" onclick="A.navMo(-1)">←</button>
        <div style="text-align:center"><div class="fw-6">${MONTHS[viewMonth.getMonth()]} ${viewMonth.getFullYear()}</div><div class="caption">Monthly goals</div></div>
        <button class="btn-ghost" onclick="A.navMo(1)">→</button>
      </div>
      ${tot?`<div class="pbar-wrap" style="padding:12px 16px 0">
        <div class="pbar" style="height:7px"><div class="pbar-fill ${done===tot&&tot?"green":""}" style="width:${tot?done/tot*100:0}%"></div></div>
        <span class="pbar-num">${done}/${tot}</span>
      </div>`:""}
      ${tot===0?`<div class="empty-state" style="padding:24px"><strong>Set your targets</strong>Add 2–4 big goals for this month</div>`:""}
      ${monthData.goals.map(g=>`<div class="goal-item">
        <div class="goal-check ${g.done?"on":""}" onclick="A.toggleGoal('${g.id}')">${g.done?`<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#111" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>`:""}</div>
        <span class="goal-text ${g.done?"done":""}">${esc(g.text)}</span>
        <button class="icon-btn" onclick="A.delGoal('${g.id}')">✕</button>
      </div>`).join("")}
      <div class="input-row">
        <input type="text" class="inp" id="goal-inp" placeholder="Add a monthly goal…" onkeydown="if(event.key==='Enter')A.addGoal()">
        <button class="btn-primary" onclick="A.addGoal()">Add</button>
      </div>
    </div>`;

  }else if(tab==="progress"){
    if(!progressData) body=`<div class="empty-state"><strong>Loading stats</strong>Crunching your history…</div>`;
    else{
      const T=progressData.weeks.reduce((a,w)=>({t:a.t+w.tot,d:a.d+w.done,m:a.m+w.mis}),{t:0,d:0,m:0});
      const pct=T.t?Math.round(T.d/T.t*100):0;
      const best=progressData.weeks.reduce((b,w)=>{const p=w.tot?w.done/w.tot:0;return p>(b.p||0)?{p,w}:b},{});
      const catTot=Object.values(progressData.cats).reduce((a,b)=>a+b,0);
      body=`<div class="card" style="margin-bottom:10px">
        <div class="card-body">
          <div class="label">All-time accomplishment</div>
          <div style="display:flex;align-items:baseline;gap:12px;margin-top:8px">
            ${ringHTML(pct)}
            <div>
              <div style="font-size:13px;color:var(--text2);margin-top:4px">${T.d} done · ${T.m} missed · ${T.t} total</div>
              <div style="font-size:13px;color:var(--text2)">${progressData.weeks.length} weeks tracked</div>
              ${best.w?`<div style="font-size:13px;color:var(--text2)">Best week: ${niceD(new Date(best.w.monday+"T00:00:00"))} · ${Math.round(best.p*100)}%</div>`:""}
            </div>
          </div>
          <div class="mt-3"><button class="btn-ghost" onclick="A.export()">⬇ Export backup</button></div>
        </div>
      </div>
      ${catTot?`<div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="fw-5">Where your work goes</span></div>
        <div class="card-body">
          ${Object.entries(progressData.cats).sort((a,b)=>b[1]-a[1]).map(([c,n])=>`<div class="stat-row">
            <span class="stat-lbl">${(CATS[c]||{label:"Other"}).label}</span>
            <div class="pbar"><div class="pbar-fill" style="width:${n/catTot*100}%;background:${catC(c)}"></div></div>
            <span class="pbar-num">${n}</span>
          </div>`).join("")}
        </div>
      </div>`:""}
      <div class="card" style="margin-bottom:10px">
        <div class="card-head"><span class="fw-5">Week by week</span><span class="caption">last 16</span></div>
        <div class="card-body">
          ${!progressData.weeks.length?`<div class="caption">No data yet — add activities and check in to build your record.</div>`:""}
          ${progressData.weeks.slice(-16).map(w=>`<div class="stat-row">
            <span class="stat-lbl">${niceD(new Date(w.monday+"T00:00:00"))}</span>
            <div class="pbar"><div class="pbar-fill ${w.tot&&w.done===w.tot?"green":""}" style="width:${w.tot?w.done/w.tot*100:0}%"></div></div>
            <span class="pbar-num">${w.done}/${w.tot}</span>
          </div>`).join("")}
        </div>
      </div>
      <div class="card">
        <div class="card-head"><span class="fw-5">Month by month</span></div>
        <div class="card-body">
          ${Object.entries(progressData.months).sort((a,b)=>a[0].localeCompare(b[0])).map(([mk,m])=>`<div class="stat-row">
            <span class="stat-lbl">${MONTHS[parseInt(mk.slice(5))-1].slice(0,3)} ${mk.slice(0,4)}</span>
            <div class="pbar"><div class="pbar-fill" style="width:${m.t?m.d/m.t*100:0}%;background:var(--accent)"></div></div>
            <span class="pbar-num">${m.d}/${m.t}</span>
          </div>`).join("")}
        </div>
      </div>`;
    }

  }else if(tab==="log"){
    body=`<div class="card">
      <div class="card-head"><span class="fw-5">Change log</span><span class="caption">Week of ${niceD(viewMon)}</span></div>
      ${!(week.log||[]).length?`<div class="empty-state">No changes yet this week.</div>`:""}
      ${(week.log||[]).map(e=>`<div class="log-row">
        <span class="log-time">${new Date(e.ts).toLocaleString("en-GB",{day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})}</span>
        <span>${esc(e.text)}</span>
      </div>`).join("")}
    </div>`;
  }

  root.innerHTML=`
    <header style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px">
      <div>
        <div class="label">Work Tracker</div>
        <div class="display" style="font-size:22px;margin-top:2px">${greet()}<em>, ${user.displayName?.split(" ")[0]||"there"}</em></div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:4px">
        <span id="ss" style="font-size:12px;color:var(--text3)"></span>
        <button class="icon-btn" onclick="A.signOut()" title="Sign out" style="font-size:11px;width:auto;padding:0 10px;height:28px;border:1px solid var(--border2);border-radius:var(--radius-xs)">Sign out</button>
      </div>
    </header>
    <nav class="nav">${navHTML}</nav>
    <main class="fade-up">${body}</main>`;
  paintSave();
}

/* ── init ───────────────────────────────────────────────── */
onAuthStateChanged(auth, async u=>{
  user=u;
  if(u){ await loadWk(); calcStreak(); refreshBadge(); }
  else render();
});
render();
</script>
</body>
</html>
